<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Model Profile — RUBY AGENCY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;1,400&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#d4213c; --red2:#b01830; --red3:#e8304a;
  --gold:#d4a843; --gold2:#c4982a;
  --black:#060306; --black2:#0d060a; --black3:#120810;
  --border:rgba(212,33,60,.18); --border2:rgba(212,33,60,.28);
  --white:#f5f0f2; --off:#c8b8be; --dim:#7a6068; --dim2:#5a4850; --text:#a89098;
  --wa:#25d366; --tg:#2aabee;
  --font-d:'Cormorant Garamond',serif;
  --font-s:'EB Garamond',serif;
  --font-b:'Rajdhani',sans-serif;
  --nav-h:68px;
}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--text);font-family:var(--font-b);min-height:100vh;overflow-x:hidden;}
a{color:inherit;text-decoration:none;}
button{border:none;background:none;font-family:inherit;cursor:pointer;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--black2);}
::-webkit-scrollbar-thumb{background:var(--red);}

/* ── NAV ─────────────────────────────────────── */
.nav{
  position:fixed; top:0; left:0; right:0; z-index:900;
  height:var(--nav-h);
  display:flex; align-items:center;
  padding:0 2rem;
  background:rgba(6,3,6,.98);
  border-bottom:2px solid var(--border2);
  box-shadow:0 2px 20px rgba(212,33,60,.12);
}
.nav-inner{width:100%;max-width:1600px;margin:0 auto;display:flex;align-items:center;gap:1.2rem;}
.nav-logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;flex-shrink:0;}
.nav-logo-text{font-family:var(--font-b);font-size:.9rem;font-weight:600;letter-spacing:.38em;color:var(--white);text-transform:uppercase;}
.nav-links-desktop{display:flex;gap:2rem;flex:1;justify-content:center;}
.nav-links-desktop a{font-size:.68rem;font-weight:500;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);transition:color .2s;}
.nav-links-desktop a:hover,.nav-links-desktop a.active{color:var(--white);}
.nav-links-desktop a.active{border-bottom:2px solid var(--red);padding-bottom:2px;}
.nav-cta-desk{display:flex;align-items:center;gap:.55rem;flex-shrink:0;}
.fav-pill{display:none;min-width:18px;height:18px;padding:0 5px;background:var(--red);color:#fff;font-size:.6rem;font-weight:700;border-radius:0;align-items:center;justify-content:center;}
.nav-burger{display:none;flex-direction:column;gap:5px;padding:6px;cursor:pointer;background:none;border:none;}
.nav-burger span{display:block;width:22px;height:2px;background:var(--white);transition:all .25s;}
.nav-burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.nav-burger.open span:nth-child(2){opacity:0;}
.nav-burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.mob-fav-icon{display:none;font-size:1.1rem;color:var(--dim);padding:4px 8px;cursor:pointer;text-decoration:none;}
@media(max-width:700px){
  .nav{padding:0 1rem;}
  .nav-links-desktop{display:none;}
  .nav-cta-desk{display:none;}
  .nav-burger{display:flex;}
  .mob-fav-icon{display:block;}
}
/* ── NAV SPACER ── */
.nav-spacer{display:block;width:100%;height:var(--nav-h);flex-shrink:0;}

/* ── DRAWER ── */
.nav-drawer{
  position:fixed;top:var(--nav-h);left:0;right:0;bottom:0;
  z-index:850;background:rgba(6,3,6,.99);border-top:2px solid var(--border);
  padding:2rem 1.5rem;flex-direction:column;overflow-y:auto;
  display:none;pointer-events:none;
}
.nav-drawer.open{display:flex;pointer-events:auto;animation:drawerIn .22s ease forwards;}
@keyframes drawerIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.drawer-item{padding:.9rem 0;font-size:.82rem;font-weight:500;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--border);transition:color .2s;cursor:pointer;}
.drawer-item:hover,.drawer-item.active{color:var(--white);}
.drawer-section-label{padding:.8rem 0 .4rem;font-size:.58rem;letter-spacing:.38em;text-transform:uppercase;color:var(--dim2);}
.drawer-cta{display:flex;flex-direction:column;gap:.8rem;margin-top:.8rem;}
.drawer-cta a{display:flex;align-items:center;justify-content:center;gap:.6rem;padding:.85rem;border:2px solid;font-size:.72rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;}
.dwa{border-color:rgba(37,211,102,.6);color:var(--wa);}
.dtg{border-color:rgba(42,171,238,.6);color:var(--tg);}

/* ── TOP BAR ── */
.top-bar{background:var(--black2);border-bottom:1px solid var(--border);padding:.45rem 2rem;font-size:.62rem;font-weight:500;letter-spacing:.22em;color:var(--dim);text-transform:uppercase;}
@media(max-width:700px){.top-bar{display:none;}}

/* ── BUTTONS ── */
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:.45rem;padding:.6rem 1.4rem;background:var(--red);color:var(--white);font-size:.7rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;font-family:var(--font-b);border:2px solid var(--red);transition:all .2s;cursor:pointer;}
.btn-primary:hover{background:var(--red2);border-color:var(--red2);}
.btn-outline{display:inline-flex;align-items:center;justify-content:center;gap:.45rem;padding:.6rem 1.4rem;background:transparent;color:var(--white);font-size:.7rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;font-family:var(--font-b);border:2px solid var(--border);transition:all .2s;cursor:pointer;}
.btn-outline:hover{border-color:var(--red3);color:var(--red3);}
.btn-wa{display:inline-flex;align-items:center;gap:.5rem;padding:.55rem 1.1rem;background:rgba(37,211,102,.1);border:2px solid rgba(37,211,102,.55);color:var(--wa);font-size:.68rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;font-family:var(--font-b);transition:all .2s;}
.btn-wa:hover{background:rgba(37,211,102,.2);}
.btn-tg{display:inline-flex;align-items:center;gap:.5rem;padding:.55rem 1.1rem;background:rgba(42,171,238,.1);border:2px solid rgba(42,171,238,.55);color:var(--tg);font-size:.68rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;font-family:var(--font-b);transition:all .2s;}
.btn-tg:hover{background:rgba(42,171,238,.2);}
.btn-sm{padding:.35rem .8rem;font-size:.62rem;}

/* ── SCROLL TOP ── */
.scroll-top{position:fixed;bottom:2rem;right:2rem;z-index:800;width:42px;height:42px;background:var(--red);color:var(--white);border:none;font-size:1.1rem;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .3s;}
.scroll-top.visible{opacity:1;pointer-events:auto;}
@media(max-width:700px){.scroll-top{bottom:1.2rem;right:1rem;}}

/* ── PAGE LOADER ── */
#page-loader{position:fixed;inset:0;z-index:9999;background:var(--black);display:flex;align-items:center;justify-content:center;transition:opacity .4s;}
#page-loader.hidden{opacity:0;pointer-events:none;}
.loader-gem{animation:loaderPulse 1.2s ease-in-out infinite;}
@keyframes loaderPulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.15);opacity:1}}

/* ── CHIPS & BADGES ── */
.chip{display:inline-block;padding:.2rem .55rem;font-size:.56rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;backdrop-filter:blur(8px);}
.chip-vip      {background:rgba(20,10,5,.75);border:1.5px solid rgba(212,168,67,.8);color:#f0c840;}
.chip-new      {background:rgba(5,15,25,.75);border:1.5px solid rgba(42,171,238,.8);color:#70deff;}
.chip-hot      {background:rgba(20,5,8,.75); border:1.5px solid var(--red3);         color:#ff6080;}
.chip-exclusive{background:rgba(15,5,25,.75);border:1.5px solid rgba(168,85,247,.8);color:#e0b4ff;}
.avail-dot{font-size:.56rem;font-weight:600;letter-spacing:.14em;color:#4ade80;text-transform:uppercase;padding:.2rem .55rem;background:rgba(5,20,10,.75);border:1.5px solid rgba(74,222,128,.6);backdrop-filter:blur(8px);}

/* ── CARDS ── */
.models-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;padding:2px 0 5rem;}
@media(max-width:1400px){.models-grid{grid-template-columns:repeat(4,1fr);}}
@media(max-width:1050px){.models-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:680px) {.models-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:380px) {.models-grid{grid-template-columns:1fr;}}

.model-card{position:relative;overflow:hidden;aspect-ratio:3/4;cursor:pointer;background:var(--black3);}
.card-bg{position:absolute;inset:0;background-size:cover;background-position:center top;transition:transform .6s ease;}
.model-card:hover .card-bg{transform:scale(1.06);}
.card-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(155deg,#200810 0%,#3a0f1e 55%,#120408 100%);}
.card-ph svg{opacity:.12;}
.card-vignette{position:absolute;inset:0;background:linear-gradient(0deg,rgba(6,3,6,.97) 0%,rgba(6,3,6,.5) 38%,rgba(6,3,6,.05) 70%,transparent 100%);}
.card-top{position:absolute;top:.7rem;left:.7rem;right:.7rem;display:flex;justify-content:space-between;align-items:flex-start;gap:.3rem;z-index:3;}
.card-tags{display:flex;gap:.3rem;flex-wrap:wrap;align-items:center;}
.card-fav-btn{background:rgba(6,3,6,.7);border:1.5px solid rgba(255,255,255,.2);width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:.85rem;color:rgba(255,255,255,.4);transition:all .2s;flex-shrink:0;cursor:pointer;line-height:1;}
.card-fav-btn:hover,.card-fav-btn.active{color:#f43f5e;border-color:rgba(244,63,94,.6);background:rgba(244,63,94,.18);}
.card-bottom{position:absolute;bottom:0;left:0;right:0;padding:1rem .85rem .85rem;z-index:3;}
.card-name{font-family:var(--font-d);font-size:clamp(1.1rem,2.2vw,1.75rem);letter-spacing:.06em;line-height:1;color:var(--white);margin-bottom:.15rem;text-shadow:0 2px 8px rgba(0,0,0,.9);}
.card-tagline{font-family:var(--font-s);font-style:italic;font-size:.78rem;color:var(--off);margin-bottom:.4rem;line-height:1.35;}
.card-meta{display:flex;gap:.45rem;flex-wrap:wrap;font-size:.58rem;font-weight:600;letter-spacing:.12em;color:var(--text);text-transform:uppercase;margin-bottom:.45rem;}
.card-meta span::after{content:'·';margin-left:.45rem;opacity:.35;}
.card-meta span:last-child::after{content:'';}
.price-pill{display:inline-block;margin-right:.25rem;margin-bottom:.2rem;padding:.18rem .52rem;border:1.5px solid rgba(212,168,67,.4);background:rgba(212,168,67,.07);font-size:.58rem;font-weight:600;color:var(--gold2);letter-spacing:.07em;}
.card-actions{display:flex;gap:.3rem;flex-wrap:wrap;opacity:0;transform:translateY(6px);transition:opacity .22s,transform .22s;pointer-events:none;}
.model-card:hover .card-actions{opacity:1;transform:translateY(0);pointer-events:auto;}
.card-view-btn{padding:.38rem .8rem;background:var(--red);border:2px solid var(--red);color:var(--white);font-size:.6rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;font-family:var(--font-b);cursor:pointer;transition:background .2s;}
.card-view-btn:hover{background:var(--red2);}
.card-icon-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:2px solid;transition:all .2s;text-decoration:none;}
.card-iwa{border-color:rgba(37,211,102,.5);color:var(--wa);background:rgba(37,211,102,.07);}
.card-iwa:hover{background:rgba(37,211,102,.2);}
.card-itg{border-color:rgba(42,171,238,.5);color:var(--tg);background:rgba(42,171,238,.07);}
.card-itg:hover{background:rgba(42,171,238,.2);}
@media(hover:none){
  .card-actions{opacity:1;transform:none;pointer-events:auto;}
  .card-icon-btn{display:none;}
  .card-view-btn{width:100%;text-align:center;padding:.45rem;}
}

/* ── FOOTER ── */
.site-footer{background:var(--black2);border-top:2px solid var(--border2);padding:2.5rem 2rem 2rem;margin-top:auto;}
.footer-inner{max-width:1600px;margin:0 auto;display:grid;grid-template-columns:1fr auto;gap:2rem;align-items:start;}
.footer-brand{display:flex;flex-direction:column;gap:.5rem;}
.footer-logo{display:flex;align-items:center;gap:.6rem;}
.footer-logo-text{font-family:var(--font-b);font-size:.82rem;font-weight:600;letter-spacing:.38em;color:var(--white);text-transform:uppercase;}
.footer-tagline{font-family:var(--font-s);font-style:italic;font-size:.88rem;color:var(--dim);margin-top:.2rem;}
.footer-phone{font-size:.7rem;font-weight:500;letter-spacing:.2em;color:var(--dim);margin-top:.3rem;}
.footer-cta{display:flex;gap:.7rem;flex-wrap:wrap;align-items:center;}
.footer-legal{grid-column:1/-1;border-top:1px solid var(--border);margin-top:1.5rem;padding-top:1rem;font-size:.58rem;letter-spacing:.12em;color:var(--dim2);text-transform:uppercase;}
@media(max-width:600px){
  .footer-inner{grid-template-columns:1fr;}
  .footer-cta{flex-direction:column;align-items:stretch;}
  .footer-cta .btn-wa,.footer-cta .btn-tg{justify-content:center;}
  .site-footer{padding:2rem 1.2rem 1.5rem;}
}


.profile-wrap{display:grid;grid-template-columns:52% 48%;min-height:calc(100vh - var(--nav-h));}
@media(max-width:900px){.profile-wrap{grid-template-columns:1fr;}}

/* ── PHOTO PANEL ── */
.photo-panel{position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));overflow:hidden;background:var(--black3);}
@media(max-width:900px){.photo-panel{position:relative;top:0;height:60vw;max-height:480px;}}
.main-photo{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;transition:opacity .3s;}
.photo-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(155deg,#200810,#3a0f1e);}
.photo-panel::after{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg,transparent 55%,rgba(6,3,6,.5) 100%);}
@media(max-width:900px){.photo-panel::after{background:linear-gradient(0deg,rgba(6,3,6,.7) 0%,transparent 40%);}}

/* thumbs — desktop only */
.thumbs-strip{position:absolute;bottom:1rem;left:1rem;right:1rem;display:flex;gap:.3rem;z-index:5;overflow-x:auto;}
.thumbs-strip::-webkit-scrollbar{height:3px;}
.thumbs-strip::-webkit-scrollbar-thumb{background:var(--red);}
.thumb{width:44px;height:58px;flex-shrink:0;object-fit:cover;cursor:pointer;border:2px solid rgba(212,33,60,.3);opacity:.5;transition:opacity .2s,border-color .2s;}
.thumb.active,.thumb:hover{opacity:1;border-color:var(--red3);}
@media(max-width:900px){.thumbs-strip{display:none;}} /* hidden on mobile — swipe instead */

/* touch swipe on mobile */
.photo-panel{touch-action:pan-y;}

/* ── INFO PANEL ── */
.info-panel{padding:3rem 3rem 5rem;overflow-y:auto;background:var(--black);}
@media(max-width:900px){.info-panel{padding:1.8rem 1.2rem 4rem;}}
.back-link{display:inline-flex;align-items:center;gap:.4rem;font-size:.65rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);border:1.5px solid var(--border);padding:.28rem .7rem;transition:all .2s;margin-bottom:1.8rem;}
.back-link:hover{color:var(--white);border-color:var(--red3);}
.profile-number{font-size:.58rem;font-weight:600;letter-spacing:.45em;color:var(--gold);text-transform:uppercase;margin-bottom:.6rem;}
.profile-name{font-family:var(--font-d);font-size:clamp(2.6rem,5.5vw,4.8rem);letter-spacing:.04em;line-height:.95;color:var(--white);margin-bottom:.5rem;}
.profile-tagline{font-family:var(--font-s);font-style:italic;font-size:1rem;color:var(--off);margin-bottom:1.1rem;line-height:1.5;}
.tags-row{display:flex;gap:.45rem;flex-wrap:wrap;align-items:center;margin-bottom:1.6rem;}
.prof-divider{height:1px;margin:1.4rem 0;background:linear-gradient(90deg,var(--red),transparent);opacity:.45;}

/* params */
.params-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:0;}
@media(max-width:500px){.params-grid{grid-template-columns:1fr;}}
.param-row{padding:.75rem .9rem;border:1px solid var(--border);background:rgba(212,33,60,.04);}
.param-lbl{font-size:.56rem;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--dim2);margin-bottom:.2rem;}
.param-val{font-size:.88rem;color:var(--white);}

/* bio */
.bio-text{font-family:var(--font-s);font-size:.95rem;line-height:1.75;color:var(--text);margin-bottom:0;}

/* pricing */
.pricing-title{font-size:.6rem;font-weight:600;letter-spacing:.32em;text-transform:uppercase;color:var(--dim2);margin-bottom:.7rem;}
.pricing-cards{display:flex;gap:.6rem;margin-bottom:0;}
.price-card{flex:1;padding:1rem 1.2rem;background:rgba(212,168,67,.06);border:1.5px solid rgba(212,168,67,.28);}
.price-dur{font-size:.58rem;font-weight:600;letter-spacing:.28em;color:var(--gold2);text-transform:uppercase;margin-bottom:.3rem;}
.price-amt{font-family:var(--font-d);font-size:1.8rem;letter-spacing:.04em;color:var(--white);line-height:1;}
.price-cur{font-size:.65rem;font-weight:600;color:var(--gold2);letter-spacing:.12em;margin-top:.2rem;}

/* CTA */
.cta-block{display:flex;flex-direction:column;gap:.55rem;}
.cta-wa,.cta-tg{display:flex;align-items:center;justify-content:center;gap:.55rem;padding:.95rem 1.5rem;font-size:.72rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;font-family:var(--font-b);border:2px solid;transition:all .2s;}
.cta-wa{background:rgba(37,211,102,.1);border-color:rgba(37,211,102,.55);color:var(--wa);}
.cta-wa:hover{background:rgba(37,211,102,.2);}
.cta-tg{background:rgba(42,171,238,.1);border-color:rgba(42,171,238,.55);color:var(--tg);}
.cta-tg:hover{background:rgba(42,171,238,.2);}
.cta-fav{width:100%;padding:.8rem;background:transparent;border:1.5px solid var(--border);color:var(--dim);font-size:.65rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;font-family:var(--font-b);cursor:pointer;transition:all .2s;}
.cta-fav:hover,.cta-fav.active{border-color:#f43f5e;color:#f43f5e;background:rgba(244,63,94,.08);}

</style>

<body>
<div id="page-loader"><div class="loader-gem"><svg width="28" height="28" viewBox="0 0 54 54" fill="none"><polygon points="27,4 50,18 50,36 27,50 4,36 4,18" fill="#9b1535" stroke="#d4213c" stroke-width="1.5"/><polygon points="27,4 50,18 27,28" fill="#c41e3a" opacity=".9"/><polygon points="27,4 4,18 27,28" fill="#7a1028" opacity=".9"/><polygon points="50,18 50,36 27,28" fill="#e03050" opacity=".8"/><polygon points="4,18 4,36 27,28" fill="#6b0d20" opacity=".85"/><polygon points="50,36 27,50 27,28" fill="#b01830" opacity=".9"/><polygon points="4,36 27,50 27,28" fill="#8a1228" opacity=".9"/></svg></div></div>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><svg width="28" height="28" viewBox="0 0 54 54" fill="none"><polygon points="27,4 50,18 50,36 27,50 4,36 4,18" fill="#9b1535" stroke="#d4213c" stroke-width="1.5"/><polygon points="27,4 50,18 27,28" fill="#c41e3a" opacity=".9"/><polygon points="27,4 4,18 27,28" fill="#7a1028" opacity=".9"/><polygon points="50,18 50,36 27,28" fill="#e03050" opacity=".8"/><polygon points="4,18 4,36 27,28" fill="#6b0d20" opacity=".85"/><polygon points="50,36 27,50 27,28" fill="#b01830" opacity=".9"/><polygon points="4,36 27,50 27,28" fill="#8a1228" opacity=".9"/></svg><span class="nav-logo-text">Ruby Agency</span></a>

    <p class="bio-text">${m.bio||''}</p>
    <div class="prof-divider"></div>
    <div class="pricing-title">Rates</div>
    <div class="pricing-cards">
      <div class="price-card"><div class="price-dur">1 Hour</div><div class="price-amt">${m.price1h||0}</div><div class="price-cur">AED</div></div>
      <div class="price-card"><div class="price-dur">2 Hours</div><div class="price-amt">${m.price2h||0}</div><div class="price-cur">AED</div></div>
    </div>
    <div class="prof-divider"></div>
    <div class="cta-block">
      <a href="${waLink}" class="cta-wa" target="_blank">${WA_LG} Book via WhatsApp</a>
      <a href="${tgLink}" class="cta-tg" target="_blank">${TG_LG} Book via Telegram</a>
      <button class="cta-fav${favActive?' active':''}" id="fav-btn" onclick="handleFav(${m.id})">${favActive?'♥ Remove from Favourites':'♡ Add to Favourites'}</button>
    </div>
  </div>`;

  document.getElementById('profile-wrap').innerHTML=photoHtml+infoHtml;

  // touch swipe for mobile photo
  initSwipe(photos);
}

let _swipePhotos=[], _swipeIdx=0;
function initSwipe(photos){
  if(!photos.length)return;
  _swipePhotos=photos; _swipeIdx=0;
  const panel=document.getElementById('photo-panel');
  if(!panel)return;
  let startX=0;
  panel.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;},{passive:true});
  panel.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-startX;
    if(Math.abs(dx)<40)return;
    if(dx<0&&_swipeIdx<_swipePhotos.length-1)_swipeIdx++;
    else if(dx>0&&_swipeIdx>0)_swipeIdx--;
    const img=document.getElementById('main-photo');
    if(img){img.style.opacity='0';setTimeout(()=>{img.src=_swipePhotos[_swipeIdx];img.style.opacity='1';},150);}
  },{passive:true});
}

function switchPhoto(thumb,src){
  const img=document.getElementById('main-photo');
  if(!img)return;
  img.style.opacity='0';
  setTimeout(()=>{img.src=src;img.style.opacity='1';},150);
  document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));
  thumb.classList.add('active');
  _swipeIdx=_swipePhotos.indexOf(src);
}

function handleFav(id){
  const active=toggleFav(id);
  const btn=document.getElementById('fav-btn');
  if(btn){btn.textContent=active?'♥ Remove from Favourites':'♡ Add to Favourites';btn.classList.toggle('active',active);}
  updateNavBadge();
}

function showNotFound(){
  document.getElementById('profile-wrap').innerHTML=`<div style="grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;">
    <div style="font-size:3rem;opacity:.2">404</div>
    <div style="font-size:.8rem;letter-spacing:.3em;color:var(--dim);text-transform:uppercase">Model not found</div>
    <a href="index.html" class="btn-primary" style="margin-top:.5rem">← Back to Models</a>
  </div>`;
}

async function init(){
  await initData();
  initNav();
  initScrollTop();
  const params=new URLSearchParams(location.search);
  const id=parseInt(params.get('id'));
  const all=getModels()||[];
  const idx=all.findIndex(m=>m.id===id);
  if(idx===-1){showNotFound();}
  else{renderProfile(all[idx],idx,all.length);}
  hideLoader();
}
init();
</script>
</body></html>
