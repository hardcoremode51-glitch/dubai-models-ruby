<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="theme-color" content="#060306">
<title>Profile — RUBY AGENCY</title>
<style>/* ============================================================
   RUBY AGENCY — Shared Styles v2
   High contrast · Dark cinematic · Ruby red + black + gold
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Barlow:wght@300;400;500&display=swap');

:root {
  --black:   #060306;
  --black2:  #0d070b;
  --black3:  #160d12;
  --black4:  #1e1118;
  --red:     #d4213c;
  --red2:    #b01830;
  --red3:    #e03050;
  --ruby:    #9b1535;
  --red-glow:rgba(212,33,60,.35);
  --gold:    #d4a843;
  --gold2:   #f0c96a;
  --white:   #fff5f7;
  --off:     #f0e0e5;
  --text:    #e8d0d8;          /* main readable text — brighter */
  --dim:     #c4a0b0;          /* secondary text — visible */
  --dim2:    #906070;          /* tertiary — still readable */
  --border:  rgba(212,33,60,.35);
  --border2: rgba(212,33,60,.6);
  --borderg: rgba(212,168,67,.3);
  --wa:      #25d366;
  --tg:      #2aabee;
  --font-d:  'Bebas Neue', sans-serif;
  --font-s:  'Cormorant Garamond', serif;
  --font-b:  'Barlow', sans-serif;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--black); color:var(--text);
  font-family:var(--font-b); font-weight:400;
  min-height:100vh; -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* grain */
body::after{
  content:''; position:fixed; inset:0; z-index:9999; pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
  opacity:.3;
}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;font-family:var(--font-b);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--black);}
::-webkit-scrollbar-thumb{background:var(--red);}

/* ─── LOADER ─────────────────────────────────── */
#page-loader{
  position:fixed; inset:0; z-index:10000;
  background:var(--black);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.5rem;
  transition:opacity .5s ease, visibility .5s ease;
}
#page-loader.hidden{opacity:0; visibility:hidden;}
.loader-gem{
  width:54px; height:54px;
  animation: gemSpin 1.4s ease-in-out infinite;
}
@keyframes gemSpin{
  0%{transform:rotate(0deg) scale(1);}
  50%{transform:rotate(180deg) scale(1.15);}
  100%{transform:rotate(360deg) scale(1);}
}
.loader-name{
  font-family:var(--font-d); font-size:1.8rem; letter-spacing:.25em;
  color:var(--white); opacity:.9;
}
.loader-bar{
  width:180px; height:2px; background:rgba(212,33,60,.2); position:relative; overflow:hidden;
}
.loader-bar::after{
  content:''; position:absolute; left:-60%; top:0; width:60%; height:100%;
  background:linear-gradient(90deg, transparent, var(--red), transparent);
  animation:loaderSlide 1.2s ease-in-out infinite;
}
@keyframes loaderSlide{0%{left:-60%;}100%{left:120%;}}

/* ─── RUBY GEM SVG LOGO ─────────────────────── */
.ruby-gem{display:inline-block; vertical-align:middle; flex-shrink:0;}

/* ─── NAV ────────────────────────────────────── */
.nav{
  position:fixed; top:0; left:0; right:0; z-index:500;
  display:flex; justify-content:space-between; align-items:center;
  padding:0 2.5rem; height:68px;
  background:rgba(6,3,6,.97);
  border-bottom:1px solid var(--border2);
  box-shadow:0 2px 30px rgba(212,33,60,.15);
}
.nav-logo{
  display:flex; align-items:center; gap:.7rem;
  font-family:var(--font-d); font-size:1.55rem; letter-spacing:.18em;
  color:var(--white); transition:opacity .2s;
}
.nav-logo:hover{opacity:.85;}
.nav-logo-text span{color:var(--red3);}
.nav-links{display:flex; gap:1.8rem; align-items:center;}
.nav-links a{
  font-size:.72rem; font-weight:500; letter-spacing:.22em; text-transform:uppercase;
  color:var(--dim); transition:color .2s; white-space:nowrap;
}
.nav-links a:hover,.nav-links a.active{color:var(--white);}
.nav-links a.active{border-bottom:1px solid var(--red);}
.nav-right{display:flex; gap:.6rem; align-items:center;}

/* ─── CONVERSION BUTTONS ─────────────────────── */
.btn-wa,.btn-tg{
  display:inline-flex; align-items:center; gap:.5rem;
  padding:.52rem 1.15rem;
  font-size:.7rem; font-weight:500; letter-spacing:.15em; text-transform:uppercase;
  border:2px solid; transition:all .25s; white-space:nowrap;
}
.btn-wa{border-color:rgba(37,211,102,.7); color:var(--wa); background:rgba(37,211,102,.1);}
.btn-wa:hover{background:rgba(37,211,102,.22); border-color:var(--wa); box-shadow:0 0 16px rgba(37,211,102,.25);}
.btn-tg{border-color:rgba(42,171,238,.7); color:var(--tg); background:rgba(42,171,238,.1);}
.btn-tg:hover{background:rgba(42,171,238,.22); border-color:var(--tg); box-shadow:0 0 16px rgba(42,171,238,.25);}

.btn-primary{
  display:inline-flex; align-items:center; justify-content:center; gap:.5rem;
  padding:.75rem 2rem; background:var(--red); border:2px solid var(--red);
  color:var(--white); font-size:.75rem; font-weight:500; letter-spacing:.2em; text-transform:uppercase;
  transition:all .25s; box-shadow:0 0 24px var(--red-glow);
}
.btn-primary:hover{background:var(--red2); border-color:var(--red2); box-shadow:0 0 40px var(--red-glow);}

.btn-outline{
  display:inline-flex; align-items:center; justify-content:center;
  padding:.75rem 2rem; background:transparent;
  border:2px solid var(--border2); color:var(--text);
  font-size:.75rem; font-weight:500; letter-spacing:.2em; text-transform:uppercase;
  transition:all .25s;
}
.btn-outline:hover{border-color:var(--red3); color:var(--white);}

/* ─── TAGS / CHIPS ───────────────────────────── */
.chip{
  display:inline-block; padding:.22rem .75rem;
  font-size:.62rem; font-weight:500; letter-spacing:.18em; text-transform:uppercase;
  border:2px solid;
}
.chip-vip      {border-color:var(--gold); color:var(--gold2); background:rgba(212,168,67,.12);}
.chip-new      {border-color:var(--red3); color:#ff8090;      background:rgba(212,33,60,.12);}
.chip-hot      {border-color:#ff7040;     color:#ff9060;       background:rgba(255,100,50,.1);}
.chip-exclusive{border-color:#c0a0ff;     color:#d0b8ff;       background:rgba(160,120,255,.1);}

/* ─── AVAILABLE DOT ─────────────────────────── */
.avail-dot{
  display:inline-flex; align-items:center; gap:.4rem;
  font-size:.65rem; font-weight:500; letter-spacing:.14em; color:#4ade80;
}
.avail-dot::before{
  content:''; width:7px; height:7px; border-radius:50%;
  background:#4ade80; box-shadow:0 0 8px #4ade80;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}

/* ─── SECTION DIVIDER ───────────────────────── */
.section-divider{
  height:2px; margin:0;
  background:linear-gradient(90deg, var(--red) 0%, var(--gold) 50%, var(--red) 100%);
  opacity:.5;
}

/* ─── FORMS ──────────────────────────────────── */
.form-field{display:flex; flex-direction:column; gap:.4rem;}
.form-label{font-size:.68rem; font-weight:500; letter-spacing:.2em; text-transform:uppercase; color:var(--dim);}
.form-input,.form-select,.form-textarea{
  background:rgba(212,33,60,.07); border:2px solid var(--border);
  color:var(--white); padding:.7rem 1rem;
  font-family:var(--font-b); font-size:.88rem; font-weight:400;
  outline:none; transition:border .25s, background .25s; width:100%;
}
.form-input::placeholder{color:var(--dim2);}
.form-input:focus,.form-select:focus,.form-textarea:focus{
  border-color:var(--red3); background:rgba(212,33,60,.12);
}
.form-select option{background:var(--black3); color:var(--white);}
.form-textarea{resize:vertical; min-height:95px;}

/* ─── UPLOAD ZONE ───────────────────────────── */
.upload-zone{
  border:2px dashed var(--border2); padding:2rem;
  text-align:center; position:relative; transition:.25s; cursor:pointer;
}
.upload-zone:hover{border-color:var(--red3); background:rgba(212,33,60,.06);}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-zone-text{font-size:.75rem; color:var(--dim); letter-spacing:.1em;}
.upload-thumbs{display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.8rem;}
.upload-thumb{width:64px; height:84px; object-fit:cover; border:2px solid var(--border);}

/* ─── SCROLL TO TOP ─────────────────────────── */
.scroll-top{
  position:fixed; bottom:1.8rem; right:1.8rem; z-index:400;
  width:46px; height:46px;
  background:var(--red); border:2px solid var(--red3);
  color:var(--white); font-size:1.1rem;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transform:translateY(12px);
  transition:opacity .3s, transform .3s, background .2s;
  pointer-events:none; box-shadow:0 4px 20px var(--red-glow);
}
.scroll-top.visible{opacity:1; transform:translateY(0); pointer-events:auto;}
.scroll-top:hover{background:var(--red2);}


.float-btn{
  display:flex; align-items:center; gap:.6rem;
  padding:.72rem 1.25rem; border:2px solid;
  font-size:.7rem; font-weight:500; letter-spacing:.14em; text-transform:uppercase;
  font-family:var(--font-b); box-shadow:0 4px 20px rgba(0,0,0,.6);
  transition:transform .2s, box-shadow .2s, background .2s;
}
.float-btn:hover{transform:translateY(-2px); box-shadow:0 8px 28px rgba(0,0,0,.7);}
.float-btn-wa{background:rgba(29,168,81,.9); border-color:#1da851; color:#fff;}
.float-btn-wa:hover{background:#1da851;}
.float-btn-tg{background:rgba(0,136,204,.85); border-color:#0088cc; color:#fff;}
.float-btn-tg:hover{background:#0088cc;}

/* ─── RESPONSIVE NAV ─────────────────────────── */
@media(max-width:900px){
  .nav{padding:0 1.2rem; height:62px;}
  .nav-links .hide-md{display:none;}
}
@media(max-width:640px){
  .nav-links{gap:1rem;}
  .nav-links .hide-sm{display:none;}
  .nav-right .btn-tg{display:none;}
  .float-cta{bottom:1rem; left:1rem;}
  .scroll-top{bottom:1rem; right:1rem;}
}

@media(max-width:640px){
  .nav{height:58px !important;padding:0 1rem !important;}
  .nav-logo{font-size:1.3rem !important;gap:.5rem !important;}
  .nav-links{gap:.8rem !important;}
  .nav-links a{font-size:.68rem !important;}
  .nav-right .btn-tg{display:none !important;}
  .nav-right .btn-wa{padding:.4rem .75rem !important;font-size:.62rem !important;}
}
</style>
<style>
.profile-wrap{
  padding-top:68px; display:grid;
  grid-template-columns:1fr 1fr; min-height:100vh;
}
@media(max-width:900px){.profile-wrap{grid-template-columns:1fr;}}

/* ─── PHOTO PANEL ─────────────────────── */
.photo-panel{
  position:sticky; top:68px; height:calc(100vh - 68px);
  overflow:hidden; background:var(--black3);
}
@media(max-width:900px){.photo-panel{position:relative; height:75vw; max-height:500px; top:0;}}

.main-photo{width:100%;height:100%;object-fit:cover;transition:opacity .4s;}
.photo-placeholder{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(155deg,#200810,#3a0f1e,#120408);
}
.photo-placeholder svg{opacity:.07;}
.photo-panel::after{
  content:''; position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(90deg, transparent 55%, rgba(6,3,6,.92) 100%),
             linear-gradient(0deg, rgba(6,3,6,.35) 0%, transparent 18%);
}
@media(max-width:900px){.photo-panel::after{background:linear-gradient(0deg,rgba(6,3,6,.8) 0%,transparent 35%);}}

.thumbs-strip{
  position:absolute; bottom:1.5rem; left:1.2rem;
  display:flex; gap:.5rem; z-index:5; flex-wrap:wrap; max-width:calc(100% - 2.4rem);
}
.thumb{
  width:56px; height:72px; object-fit:cover; cursor:pointer;
  border:2px solid rgba(212,33,60,.3); opacity:.55; transition:all .2s;
}
.thumb.active,.thumb:hover{opacity:1; border-color:var(--red3);}

.video-badge{
  position:absolute; top:1.2rem; left:1.2rem; z-index:5;
  background:rgba(212,33,60,.9); color:var(--white);
  padding:.35rem .85rem; font-size:.65rem; font-weight:500; letter-spacing:.2em; text-transform:uppercase;
  display:flex; align-items:center; gap:.4rem; border:1px solid var(--red3);
}

/* ─── INFO PANEL ──────────────────────── */
.info-panel{
  padding:3rem 3rem 4rem;
  overflow-y:auto; background:var(--black);
}
@media(max-width:900px){.info-panel{padding:2rem 1.4rem 3rem;}}

.back-link{
  display:inline-flex; align-items:center; gap:.55rem;
  font-size:.72rem; font-weight:500; letter-spacing:.22em; text-transform:uppercase;
  color:var(--dim); margin-bottom:2rem; transition:color .2s;
  border:2px solid var(--border); padding:.4rem .9rem;
}
.back-link:hover{color:var(--white); border-color:var(--red);}

.profile-number{
  font-size:.65rem; font-weight:500; letter-spacing:.45em; color:var(--gold);
  text-transform:uppercase; margin-bottom:.7rem;
}
.profile-name{
  font-family:var(--font-d);
  font-size:clamp(3rem,6vw,5rem); letter-spacing:.04em; line-height:.95;
  color:var(--white); margin-bottom:.7rem;
}
.profile-tagline{
  font-family:var(--font-s); font-style:italic;
  font-size:1.1rem; color:var(--off); margin-bottom:1.5rem; line-height:1.5;
}
.tags-row{display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; margin-bottom:1.8rem;}

.prof-divider{height:2px; margin:1.8rem 0; background:linear-gradient(90deg,var(--red),transparent); opacity:.5;}

/* params */
.params-grid{display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:1.8rem;}
.param-row{
  padding:1rem; border:2px solid var(--border);
  background:rgba(212,33,60,.05);
}
.param-label{font-size:.62rem; font-weight:500; letter-spacing:.25em; text-transform:uppercase; color:var(--dim); margin-bottom:.3rem;}
.param-val{font-size:.95rem; font-weight:400; color:var(--white);}

/* pricing */
.pricing-title{
  font-size:.68rem; font-weight:500; letter-spacing:.3em; color:var(--gold); text-transform:uppercase;
  margin-bottom:1rem; display:flex; align-items:center; gap:.7rem;
}
.pricing-title::before{content:''; width:22px; height:2px; background:var(--gold);}
.pricing-cards{display:grid; grid-template-columns:1fr 1fr; gap:.8rem; margin-bottom:1.8rem;}
.price-card{
  padding:1.5rem; text-align:center;
  border:2px solid rgba(212,33,60,.5);
  background:linear-gradient(135deg,rgba(212,33,60,.1),rgba(212,33,60,.03));
  position:relative; overflow:hidden;
}
.price-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--red);}
.price-dur{font-size:.65rem; font-weight:500; letter-spacing:.22em; color:var(--dim); text-transform:uppercase; margin-bottom:.5rem;}
.price-amt{font-family:var(--font-d); font-size:2.8rem; letter-spacing:.03em; color:var(--white); line-height:1;}
.price-cur{font-size:.75rem; font-weight:500; color:var(--gold); display:block; margin-top:.3rem;}

/* bio */
.bio-text{
  font-size:.9rem; line-height:2; color:var(--text);
  border-left:3px solid var(--red); padding-left:1.2rem; margin-bottom:1.8rem;
}

/* CTA */
.cta-block{display:flex; flex-direction:column; gap:.7rem;}
.cta-wa,.cta-tg{
  display:flex; align-items:center; justify-content:center; gap:.8rem;
  padding:1.15rem; font-size:.78rem; font-weight:500; letter-spacing:.22em; text-transform:uppercase;
  border:2px solid; transition:all .25s; font-family:var(--font-b);
}
.cta-wa{background:rgba(37,211,102,.1); border-color:rgba(37,211,102,.7); color:var(--wa);}
.cta-wa:hover{background:rgba(37,211,102,.22); box-shadow:0 0 28px rgba(37,211,102,.25);}
.cta-tg{background:rgba(42,171,238,.1); border-color:rgba(42,171,238,.7); color:var(--tg);}
.cta-tg:hover{background:rgba(42,171,238,.22); box-shadow:0 0 28px rgba(42,171,238,.25);}
.cta-fav{
  width:100%; padding:1rem; background:transparent;
  border:2px solid var(--border2); color:var(--text);
  font-size:.72rem; font-weight:500; letter-spacing:.22em; text-transform:uppercase;
  font-family:var(--font-b); transition:all .25s;
}
.cta-fav:hover,.cta-fav.active{border-color:#f43f5e; color:#f43f5e;}
</style>
</head>

function getModels()   { const d=localStorage.getItem(DB_MODELS); return d?JSON.parse(d):null; }

function getFavs()     { const d=localStorage.getItem(DB_FAVS);   return d?JSON.parse(d):[]; }
function saveFavs(f)   { localStorage.setItem(DB_FAVS,JSON.stringify(f)); }
function getConfig()   { const d=localStorage.getItem(DB_CFG);    return d?Object.assign({},DEFAULT_CONFIG,JSON.parse(d)):Object.assign({},DEFAULT_CONFIG); }
function saveConfig(c) { localStorage.setItem(DB_CFG,JSON.stringify(c)); }

function initData() { if(!getModels()) saveModels(DEMO_MODELS); }

function toggleFav(id) {
  let f=getFavs(); const i=f.indexOf(id);
  if(i>-1) f.splice(i,1); else f.push(id);
  saveFavs(f); return f.includes(id);
}
function isFav(id){ return getFavs().includes(id); }

function injectNav() {
  const cfg=getConfig();
  ['nav-wa','nav-wa2'].forEach(id=>{const e=document.getElementById(id);if(e)e.href=cfg.waLink;});
  ['nav-tg','nav-tg2'].forEach(id=>{const e=document.getElementById(id);if(e)e.href=cfg.tgLink;});
  const p=document.getElementById('nav-phone'); if(p) p.textContent=cfg.phone;
}

function staggerIn(sel,delay=60){
  document.querySelectorAll(sel).forEach((el,i)=>{
    el.style.opacity='0'; el.style.transform='translateY(28px)';
    el.style.transition=`opacity .55s ease ${i*delay}ms, transform .55s ease ${i*delay}ms`;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ el.style.opacity='1'; el.style.transform='translateY(0)'; }));
  });
}

<script>
function init(){
  initData(); injectNav(); updateFavBadge(); initScrollTop();
  const id=parseInt(new URLSearchParams(window.location.search).get('id'));
  if(!id){showNotFound();return;}
  const models=getModels()||[];
  const idx=models.findIndex(m=>m.id===id);
  if(idx<0){showNotFound();return;}
  renderProfile(models[idx],idx,models.length);
  setTimeout(()=>document.getElementById('page-loader').classList.add('hidden'),900);
}

function updateFavBadge(){
  const el=document.getElementById('fav-badge');
  const n=getFavs().length;
  if(el) el.textContent=n?`(${n})`:'';
}

function initScrollTop(){
  const btn=document.getElementById('scroll-top');
  window.addEventListener('scroll',()=>btn.classList.toggle('visible',window.scrollY>300));
}

function renderProfile(m,idx,total){
  const cfg=getConfig();

  const tgUser=(m.tg||cfg.tg).replace('@','');

  const tgLink=`https://t.me/${tgUser}`;

  const _nw=document.getElementById('nav-wa'); if(_nw) _nw.href=waLink;
  const _nt=document.getElementById('nav-tg'); if(_nt) _nt.href=tgLink;
  document.title=`${m.name} — RUBY AGENCY`;
  const favActive=isFav(m.id);
  const price1h=m.price1h||m.p1||0;
  const price2h=m.price2h||m.p2||0;

  const avail=m.available?`<span class="avail-dot">Available Now</span>`:'';
  const thumbsHtml=(m.photos||[]).slice(1).map((p,i)=>
    `<img class="thumb${i===0?' active':''}" src="${p}" onclick="switchPhoto(this,'${p}')" alt="">`
  ).join('');

  const photoPanelHtml=`
    <div class="photo-panel">
      ${m.video?'<div class="video-badge">▶ Video</div>':''}

  const TG_LG=`<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>`;

  const infoPanelHtml=`
    <div class="info-panel">
      <a href="index.html" class="back-link">← Back to models</a>
      <div class="profile-number">${String(idx+1).padStart(3,'0')} / ${String(total).padStart(3,'0')}</div>
      <h1 class="profile-name">${m.name.toUpperCase()}</h1>
      <p class="profile-tagline">${m.tagline||''}</p>
      <div class="tags-row">${tag}${avail}</div>
      <div class="prof-divider"></div>
      <div class="params-grid">${paramsHtml}</div>
      <div class="prof-divider"></div>
      <div class="pricing-title">Rates</div>
      <div class="pricing-cards">

          <div class="price-dur">1 Hour</div>
          <div class="price-amt">${price1h}</div>
          <span class="price-cur">AED</span>
        </div>
        <div class="price-card">
          <div class="price-dur">2 Hours</div>
          <div class="price-amt">${price2h}</div>

function switchPhoto(thumb,src){
  const main=document.getElementById('main-photo');
  if(main){main.style.opacity='0';setTimeout(()=>{main.src=src;main.style.opacity='1';},200);}
  document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));
  thumb.classList.add('active');
}
function handleFav(id){
  const active=toggleFav(id);
  const btn=document.getElementById('fav-btn');
  if(btn){btn.classList.toggle('active',active);btn.textContent=active?'♥ Remove from Favourites':'♡ Add to Favourites';}
  updateFavBadge();
}
function showNotFound(){
  document.getElementById('profile-wrap').innerHTML=`
    <div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:1.5rem;color:var(--dim)">
      <span style="font-size:1.2rem">Profile not found</span>
      <a href="index.html" class="btn-primary">← Back to models</a>
    </div>`;
  setTimeout(()=>document.getElementById('page-loader').classList.add('hidden'),900);
}
init();
</script>
