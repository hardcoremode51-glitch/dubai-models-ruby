<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#060306">
<title>Favourites — RUBY AGENCY</title>
<style>

/* ============================================================
   RUBY AGENCY — Shared Styles v2
   High contrast · Dark cinematic · Ruby red + black + gold
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Barlow:wght@300;400;500&display=swap');

:root {
  --black:   #060306;
  --black2:  #0d070b;
  --black3:  #160d12;
  --black4:  #1e1118;
  --red:     #d4213c;
  --red2:    #b01830;
  --red3:    #e03050;
  --ruby:    #9b1535;
  --red-glow:rgba(212,33,60,.35);
  --gold:    #d4a843;
  --gold2:   #f0c96a;
  --white:   #fff5f7;
  --off:     #f0e0e5;
  --text:    #e8d0d8;          /* main readable text — brighter */
  --dim:     #c4a0b0;          /* secondary text — visible */
  --dim2:    #906070;          /* tertiary — still readable */
  --border:  rgba(212,33,60,.35);
  --border2: rgba(212,33,60,.6);
  --borderg: rgba(212,168,67,.3);
  --wa:      #25d366;
  --tg:      #2aabee;
  --font-d:  'Bebas Neue', sans-serif;
  --font-s:  'Cormorant Garamond', serif;
  --font-b:  'Barlow', sans-serif;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--black); color:var(--text);
  font-family:var(--font-b); font-weight:400;
  min-height:100vh; -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* grain */
body::after{
  content:''; position:fixed; inset:0; z-index:9999; pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
  opacity:.3;
}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;font-family:var(--font-b);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--black);}
::-webkit-scrollbar-thumb{background:var(--red);}

/* ─── LOADER ─────────────────────────────────── */
#page-loader{
  position:fixed; inset:0; z-index:10000;
  background:var(--black);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.5rem;
  transition:opacity .5s ease, visibility .5s ease;
}
#page-loader.hidden{opacity:0; visibility:hidden;}
.loader-gem{
  width:54px; height:54px;
  animation: gemSpin 1.4s ease-in-out infinite;
}
@keyframes gemSpin{
  0%{transform:rotate(0deg) scale(1);}
  50%{transform:rotate(180deg) scale(1.15);}
  100%{transform:rotate(360deg) scale(1);}
}
.loader-name{
  font-family:var(--font-d); font-size:1.8rem; letter-spacing:.25em;
  color:var(--white); opacity:.9;
}
.loader-bar{
  width:180px; height:2px; background:rgba(212,33,60,.2); position:relative; overflow:hidden;
}
.loader-bar::after{
  content:''; position:absolute; left:-60%; top:0; width:60%; height:100%;
  background:linear-gradient(90deg, transparent, var(--red), transparent);
  animation:loaderSlide 1.2s ease-in-out infinite;
}
@keyframes loaderSlide{0%{left:-60%;}100%{left:120%;}}

/* ─── RUBY GEM SVG LOGO ─────────────────────── */
.ruby-gem{display:inline-block; vertical-align:middle; flex-shrink:0;}

/* ─── NAV ────────────────────────────────────── */
.nav{
  position:fixed; top:0; left:0; right:0; z-index:500;
  display:flex; justify-content:space-between; align-items:center;
  padding:0 2.5rem; height:68px;
  background:rgba(6,3,6,.97);
  border-bottom:1px solid var(--border2);
  box-shadow:0 2px 30px rgba(212,33,60,.15);
}
.nav-logo{
  display:flex; align-items:center; gap:.7rem;
  font-family:var(--font-d); font-size:1.55rem; letter-spacing:.18em;
  color:var(--white); transition:opacity .2s;
}
.nav-logo:hover{opacity:.85;}
.nav-logo-text span{color:var(--red3);}
.nav-links{display:flex; gap:1.8rem; align-items:center;}
.nav-links a{
  font-size:.72rem; font-weight:500; letter-spacing:.22em; text-transform:uppercase;
  color:var(--dim); transition:color .2s; white-space:nowrap;
}
.nav-links a:hover,.nav-links a.active{color:var(--white);}
.nav-links a.active{border-bottom:1px solid var(--red);}
.nav-right{display:flex; gap:.6rem; align-items:center;}

/* ─── CONVERSION BUTTONS ─────────────────────── */
.btn-wa,.btn-tg{
  display:inline-flex; align-items:center; gap:.5rem;
  padding:.52rem 1.15rem;
  font-size:.7rem; font-weight:500; letter-spacing:.15em; text-transform:uppercase;
  border:2px solid; transition:all .25s; white-space:nowrap;
}
.btn-wa{border-color:rgba(37,211,102,.7); color:var(--wa); background:rgba(37,211,102,.1);}
.btn-wa:hover{background:rgba(37,211,102,.22); border-color:var(--wa); box-shadow:0 0 16px rgba(37,211,102,.25);}
.btn-tg{border-color:rgba(42,171,238,.7); color:var(--tg); background:rgba(42,171,238,.1);}
.btn-tg:hover{background:rgba(42,171,238,.22); border-color:var(--tg); box-shadow:0 0 16px rgba(42,171,238,.25);}

.btn-primary{
  display:inline-flex; align-items:center; justify-content:center; gap:.5rem;
  padding:.75rem 2rem; background:var(--red); border:2px solid var(--red);
  color:var(--white); font-size:.75rem; font-weight:500; letter-spacing:.2em; text-transform:uppercase;
  transition:all .25s; box-shadow:0 0 24px var(--red-glow);
}
.btn-primary:hover{background:var(--red2); border-color:var(--red2); box-shadow:0 0 40px var(--red-glow);}

.btn-outline{
  display:inline-flex; align-items:center; justify-content:center;
  padding:.75rem 2rem; background:transparent;
  border:2px solid var(--border2); color:var(--text);
  font-size:.75rem; font-weight:500; letter-spacing:.2em; text-transform:uppercase;
  transition:all .25s;
}
.btn-outline:hover{border-color:var(--red3); color:var(--white);}

/* ─── TAGS / CHIPS ───────────────────────────── */
.chip{
  display:inline-block; padding:.22rem .75rem;
  font-size:.62rem; font-weight:500; letter-spacing:.18em; text-transform:uppercase;
  border:2px solid;
}
.chip-vip      {border-color:var(--gold); color:var(--gold2); background:rgba(212,168,67,.12);}
.chip-new      {border-color:var(--red3); color:#ff8090;      background:rgba(212,33,60,.12);}
.chip-hot      {border-color:#ff7040;     color:#ff9060;       background:rgba(255,100,50,.1);}
.chip-exclusive{border-color:#c0a0ff;     color:#d0b8ff;       background:rgba(160,120,255,.1);}

/* ─── AVAILABLE DOT ─────────────────────────── */
.avail-dot{
  display:inline-flex; align-items:center; gap:.4rem;
  font-size:.65rem; font-weight:500; letter-spacing:.14em; color:#4ade80;
}
.avail-dot::before{
  content:''; width:7px; height:7px; border-radius:50%;
  background:#4ade80; box-shadow:0 0 8px #4ade80;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}

/* ─── SECTION DIVIDER ───────────────────────── */
.section-divider{
  height:2px; margin:0;
  background:linear-gradient(90deg, var(--red) 0%, var(--gold) 50%, var(--red) 100%);
  opacity:.5;
}

/* ─── FORMS ──────────────────────────────────── */
.form-field{display:flex; flex-direction:column; gap:.4rem;}
.form-label{font-size:.68rem; font-weight:500; letter-spacing:.2em; text-transform:uppercase; color:var(--dim);}
.form-input,.form-select,.form-textarea{
  background:rgba(212,33,60,.07); border:2px solid var(--border);
  color:var(--white); padding:.7rem 1rem;
  font-family:var(--font-b); font-size:.88rem; font-weight:400;
  outline:none; transition:border .25s, background .25s; width:100%;
}
.form-input::placeholder{color:var(--dim2);}
.form-input:focus,.form-select:focus,.form-textarea:focus{
  border-color:var(--red3); background:rgba(212,33,60,.12);
}
.form-select option{background:var(--black3); color:var(--white);}
.form-textarea{resize:vertical; min-height:95px;}

/* ─── UPLOAD ZONE ───────────────────────────── */
.upload-zone{
  border:2px dashed var(--border2); padding:2rem;
  text-align:center; position:relative; transition:.25s; cursor:pointer;
}
.upload-zone:hover{border-color:var(--red3); background:rgba(212,33,60,.06);}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-zone-text{font-size:.75rem; color:var(--dim); letter-spacing:.1em;}
.upload-thumbs{display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.8rem;}
.upload-thumb{width:64px; height:84px; object-fit:cover; border:2px solid var(--border);}

/* ─── SCROLL TO TOP ─────────────────────────── */
.scroll-top{
  position:fixed; bottom:1.8rem; right:1.8rem; z-index:400;
  width:46px; height:46px;
  background:var(--red); border:2px solid var(--red3);
  color:var(--white); font-size:1.1rem;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transform:translateY(12px);
  transition:opacity .3s, transform .3s, background .2s;
  pointer-events:none; box-shadow:0 4px 20px var(--red-glow);
}
.scroll-top.visible{opacity:1; transform:translateY(0); pointer-events:auto;}
.scroll-top:hover{background:var(--red2);}

/* ─── FLOAT CTA BUTTONS ──────────────────────── */
.float-cta{
  position:fixed; bottom:1.8rem; left:1.8rem; z-index:399;
  display:flex; flex-direction:column; gap:.55rem;
}
.float-btn{
  display:flex; align-items:center; gap:.6rem;
  padding:.72rem 1.25rem; border:2px solid;
  font-size:.7rem; font-weight:500; letter-spacing:.14em; text-transform:uppercase;
  font-family:var(--font-b); box-shadow:0 4px 20px rgba(0,0,0,.6);
  transition:transform .2s, box-shadow .2s, background .2s;
}
.float-btn:hover{transform:translateY(-2px); box-shadow:0 8px 28px rgba(0,0,0,.7);}
.float-btn-wa{background:rgba(29,168,81,.9); border-color:#1da851; color:#fff;}
.float-btn-wa:hover{background:#1da851;}
.float-btn-tg{background:rgba(0,136,204,.85); border-color:#0088cc; color:#fff;}
.float-btn-tg:hover{background:#0088cc;}

/* ─── RESPONSIVE NAV ─────────────────────────── */
@media(max-width:900px){
  .nav{padding:0 1.2rem; height:62px;}
  .nav-links .hide-md{display:none;}
}
@media(max-width:640px){
  .nav-links{gap:1rem;}
  .nav-links .hide-sm{display:none;}
  .nav-right .btn-tg{display:none;}
  .float-cta{bottom:1rem; left:1rem;}
  .scroll-top{bottom:1rem; right:1rem;}
}


/* ══ PAGE STYLES ══════════════════════════════════════ */

/* TOP BAR — hidden on mobile */
.top-bar{
  background:var(--black2); border-bottom:2px solid var(--border2);
  padding:.5rem 2.5rem;
  display:flex; justify-content:space-between; align-items:center; gap:1rem;
}
.top-bar-text{font-size:.68rem;font-weight:500;letter-spacing:.25em;color:var(--dim);text-transform:uppercase;}
.top-bar-cta{display:flex;gap:.5rem;}
@media(max-width:640px){.top-bar{display:none;}}

/* NAV overrides */
.nav-right .btn-wa,
.nav-right .btn-tg{font-size:.68rem;padding:.46rem .95rem;}
@media(max-width:640px){
  .nav{height:58px;padding:0 1rem;}
  .nav-logo{font-size:1.3rem;gap:.5rem;}
  .nav-links{gap:.9rem;}
  .nav-links a{font-size:.68rem;}
  .nav-right .btn-tg{display:none;}
  .nav-right .btn-wa{padding:.4rem .75rem;font-size:.62rem;}
}

/* ── FILTERS ─────────────────────────────────── */
.filters-bar{
  position:sticky; top:68px; z-index:100;
  background:rgba(6,3,6,.97); backdrop-filter:blur(14px);
  border-bottom:2px solid var(--border);
  padding:.9rem 2.5rem;
  display:flex; align-items:center; justify-content:space-between; gap:.8rem;
  flex-wrap:nowrap;
}
@media(max-width:640px){
  .filters-bar{top:58px; padding:.7rem 1rem; flex-wrap:wrap; gap:.5rem;}
}

.filter-scroll{
  display:flex; align-items:center; gap:.45rem;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  scrollbar-width:none; flex:1; min-width:0;
}
.filter-scroll::-webkit-scrollbar{display:none;}

.filter-label{
  font-size:.62rem;font-weight:500;letter-spacing:.28em;
  color:var(--dim2);text-transform:uppercase;white-space:nowrap;flex-shrink:0;
}
.filter-btn{
  white-space:nowrap; flex-shrink:0;
  padding:.4rem .95rem;
  background:transparent; border:2px solid rgba(212,33,60,.35);
  color:var(--dim); font-size:.66rem;font-weight:500;letter-spacing:.16em;text-transform:uppercase;
  transition:all .2s; font-family:var(--font-b);
}
.filter-btn:hover{border-color:var(--red3);color:var(--text);}
.filter-btn.active{border-color:var(--red3);color:var(--white);background:rgba(212,33,60,.2);}

.count-badge{
  font-size:.65rem;font-weight:500;letter-spacing:.18em;color:var(--gold);
  white-space:nowrap;flex-shrink:0;
}

/* ── DESKTOP GRID (≥821px) ───────────────────── */
.models-grid{
  padding:1.5rem 2.5rem 5rem;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:2px;
}
@media(max-width:1200px){.models-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:820px){.models-grid{grid-template-columns:repeat(2,1fr);padding:1rem 1rem 4rem;}}

/* ── DESKTOP CARD ────────────────────────────── */
.model-card{
  position:relative;overflow:hidden;aspect-ratio:2/3;cursor:pointer;
  background:var(--black3);
}
.model-card.wide{grid-column:span 2;aspect-ratio:auto;min-height:520px;}
@media(max-width:820px){.model-card.wide{grid-column:span 2;min-height:360px;}}

.card-bg{
  position:absolute;inset:0;
  transition:transform .65s cubic-bezier(.25,.46,.45,.94);
  background:linear-gradient(155deg,#200810 0%,#3a0f1e 55%,#120408 100%);
}
.card-bg.has-photo{background-size:cover!important;background-position:center top!important;}
.model-card:hover .card-bg{transform:scale(1.07);}

.card-vignette{
  position:absolute;inset:0;
  background:
    linear-gradient(0deg,rgba(6,3,6,.98) 0%,rgba(6,3,6,.7) 30%,rgba(6,3,6,.2) 55%,transparent 100%),
    radial-gradient(ellipse at 50% 100%,rgba(6,3,6,.45) 0%,transparent 55%);
}
.card-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.card-icon svg{opacity:.07;}

.card-top{position:absolute;top:1rem;left:1rem;right:1rem;display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;}
.card-tags{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;}
.card-fav{
  background:rgba(6,3,6,.7);border:2px solid rgba(255,255,255,.25);
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  font-size:1rem;color:rgba(255,255,255,.5);transition:all .22s;flex-shrink:0;
}
.card-fav:hover,.card-fav.active{color:#f43f5e;border-color:rgba(244,63,94,.7);background:rgba(244,63,94,.18);}

.card-bottom{position:absolute;bottom:0;left:0;right:0;padding:1.5rem 1.2rem 1.2rem;}
.card-name{
  font-family:var(--font-d);font-size:2.1rem;letter-spacing:.06em;line-height:1;
  color:var(--white);margin-bottom:.3rem;text-shadow:0 2px 12px rgba(0,0,0,.8);
}
.model-card.wide .card-name{font-size:2.9rem;}
.card-tagline{
  font-family:var(--font-s);font-style:italic;
  font-size:.88rem;color:var(--off);margin-bottom:.65rem;line-height:1.4;
  text-shadow:0 1px 8px rgba(0,0,0,.9);
}
.card-meta{
  display:flex;gap:.8rem;flex-wrap:wrap;
  font-size:.68rem;font-weight:500;letter-spacing:.14em;color:var(--text);
  text-transform:uppercase;margin-bottom:.75rem;
}
.card-prices{
  display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:.8rem;
}
.price-pill{
  padding:.26rem .75rem;
  border:2px solid rgba(212,168,67,.6);background:rgba(212,168,67,.12);
  font-size:.65rem;font-weight:500;letter-spacing:.1em;color:var(--gold2);
}

/* hover actions — desktop only */
.card-actions{
  display:flex;gap:.5rem;flex-wrap:wrap;
  opacity:0;transform:translateY(10px);
  transition:opacity .28s,transform .28s;pointer-events:none;
}
.model-card:hover .card-actions{opacity:1;transform:translateY(0);pointer-events:auto;}

.card-btn-view{
  padding:.5rem 1.2rem;background:var(--red);border:2px solid var(--red);
  color:var(--white);font-size:.67rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;
  font-family:var(--font-b);transition:background .2s;
}
.card-btn-view:hover{background:var(--red2);}
.card-wa,.card-tg{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border:2px solid;transition:all .2s;flex-shrink:0;
}
.card-wa{border-color:rgba(37,211,102,.7);color:var(--wa);background:rgba(37,211,102,.12);}
.card-wa:hover{background:rgba(37,211,102,.28);}
.card-tg{border-color:rgba(42,171,238,.7);color:var(--tg);background:rgba(42,171,238,.12);}
.card-tg:hover{background:rgba(42,171,238,.28);}

/* ── MOBILE LIST (≤640px) ────────────────────── */
@media(max-width:640px){
  .models-grid{
    display:flex !important;
    flex-direction:column;
    padding:.8rem .8rem 4rem;
    gap:0;
  }
  /* reset all grid card styles */
  .model-card,
  .model-card.wide{
    position:relative;
    aspect-ratio:auto !important;
    min-height:auto !important;
    grid-column:auto !important;
    width:100%;
    margin-bottom:1px;
    overflow:hidden;
    cursor:pointer;
  }
  /* tall photo */
  .card-bg{
    position:relative !important;
    width:100%;
    height:72vw;
    min-height:260px;
    max-height:420px;
    display:block;
  }
  /* reset absolute layers */
  .card-vignette{
    position:absolute;
    inset:auto;
    bottom:0;left:0;right:0;
    height:55%;
    background:linear-gradient(0deg,rgba(6,3,6,1) 0%,rgba(6,3,6,.6) 60%,transparent 100%);
    top:auto;
  }
  .card-icon{display:none;}
  .card-top{
    position:absolute;
    top:.85rem;left:.85rem;right:.85rem;
    z-index:3;
  }
  .card-bottom{
    position:relative !important;
    background:var(--black3);
    border-top:2px solid var(--border);
    padding:1.1rem 1rem 1rem;
    z-index:2;
  }
  .card-name{font-size:1.7rem;margin-bottom:.2rem;}
  .card-tagline{font-size:.82rem;margin-bottom:.5rem;}
  .card-meta{font-size:.65rem;gap:.6rem;margin-bottom:.5rem;}
  .card-prices{margin-bottom:.8rem;}
  /* always-visible action row on mobile — only View Profile button */
  .card-actions{
    opacity:1 !important;
    transform:none !important;
    pointer-events:auto !important;
    display:flex;
    gap:.5rem;
  }
  .card-wa,.card-tg{display:none !important;}
  .card-btn-view{
    width:100%;
    padding:.65rem;
    font-size:.72rem;
    text-align:center;
    justify-content:center;
  }
}

/* ── EMPTY ───────────────────────────────────── */
.empty-state{
  grid-column:1/-1;text-align:center;padding:5rem 2rem;
  color:var(--dim);font-size:.85rem;letter-spacing:.2em;text-transform:uppercase;
}

/* ── CONTACT FOOTER ──────────────────────────── */
.contact-footer{
  padding:1.8rem 2.5rem;background:var(--black2);border-top:2px solid var(--border2);
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1.2rem;
}
.cf-item{display:flex;flex-direction:column;gap:.3rem;}
.cf-label{font-size:.62rem;font-weight:500;letter-spacing:.28em;color:var(--dim2);text-transform:uppercase;}
.cf-val{font-size:.88rem;font-weight:500;color:var(--text);}
.cf-btns{display:flex;gap:.6rem;flex-wrap:wrap;}
@media(max-width:640px){
  .contact-footer{padding:1.2rem 1rem;}
  .cf-item{display:none;}
}


/* ═══ NAVBAR ═══════════════════════════════════════════════════ */
.nav {
  position: fixed !important;
  top: 0; left: 0; right: 0;
  z-index: 900;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2.2rem;
  background: rgba(6,3,6,.98);
  border-bottom: 2px solid var(--border2);
  box-shadow: 0 2px 24px rgba(212,33,60,.14);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.nav-spacer { height: 64px; flex-shrink: 0; }

.nav-logo {
  display: flex; align-items: center; gap: .6rem;
  font-family: var(--font-d); font-size: 1.5rem; letter-spacing: .18em;
  color: var(--white); text-decoration: none; flex-shrink: 0;
  transition: opacity .2s;
}
.nav-logo:hover { opacity: .85; }
.nav-logo-text span { color: var(--red3); }

/* desktop links */
.nav-center {
  display: flex; align-items: center; gap: 1.8rem;
}
.nav-center a {
  font-size: .72rem; font-weight: 500; letter-spacing: .2em;
  text-transform: uppercase; color: var(--dim);
  text-decoration: none; transition: color .2s; white-space: nowrap;
}
.nav-center a:hover, .nav-center a.active { color: var(--white); }
.nav-center a.active { border-bottom: 2px solid var(--red); padding-bottom: 2px; }

/* right side */
.nav-right-desktop {
  display: flex; align-items: center; gap: .6rem;
}
.nav-right-desktop .btn-wa,
.nav-right-desktop .btn-tg {
  font-size: .66rem; padding: .44rem .9rem;
}

/* ── BURGER (mobile only) ──────────── */
.nav-burger {
  display: none;
  flex-direction: column; justify-content: center; align-items: center;
  gap: 5px; width: 40px; height: 40px;
  background: transparent; border: 2px solid var(--border2);
  cursor: pointer; transition: border-color .2s; flex-shrink: 0;
}
.nav-burger:hover { border-color: var(--red); }
.nav-burger span {
  display: block; width: 20px; height: 2px;
  background: var(--text); transition: all .28s ease;
  transform-origin: center;
}
.nav-burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.nav-burger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.nav-burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* fav counter pill */
.fav-count-pill {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px; padding: 0 4px;
  background: var(--red); border-radius: 9px;
  font-size: .58rem; font-weight: 500; color: var(--white);
  margin-left: .3rem; vertical-align: middle;
}

/* ── MOBILE DRAWER ──────────────────── */
.nav-drawer {
  display: none;
  position: fixed; top: 64px; left: 0; right: 0; bottom: 0;
  z-index: 850;
  background: rgba(6,3,6,.98);
  border-top: 2px solid var(--border);
  padding: 1.8rem 1.5rem 2rem;
  flex-direction: column;
  gap: 0;
  overflow-y: auto;
  transform: translateY(-8px);
  opacity: 0;
  transition: opacity .25s ease, transform .25s ease;
  pointer-events: none;
}
.nav-drawer.open {
  display: flex;
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.drawer-link {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 1.1rem; font-family: var(--font-d); letter-spacing: .12em;
  color: var(--text); text-decoration: none; transition: color .2s;
}
.drawer-link:hover, .drawer-link.active { color: var(--white); }
.drawer-link.active { color: var(--red3); }
.drawer-contact {
  margin-top: 1.8rem;
  display: flex; flex-direction: column; gap: .8rem;
}
.drawer-contact .btn-wa,
.drawer-contact .btn-tg {
  display: flex; align-items: center; justify-content: center;
  gap: .6rem; padding: 1rem; font-size: .78rem; font-weight: 500;
}
.drawer-label {
  font-size: .6rem; font-weight: 500; letter-spacing: .3em;
  color: var(--dim2); text-transform: uppercase; margin-top: .8rem;
}

/* ── RESPONSIVE BREAKPOINT ──────────── */
@media (max-width: 700px) {
  .nav { padding: 0 1rem; }
  .nav-center { display: none; }
  .nav-right-desktop { display: none; }
  .nav-burger { display: flex; }
}
@media (min-width: 701px) {
  .nav-drawer { display: none !important; }
}

function getModels()   { const d=localStorage.getItem(DB_MODELS); return d?JSON.parse(d):null; }
function saveModels(m) { localStorage.setItem(DB_MODELS,JSON.stringify(m)); }
function getFavs()     { const d=localStorage.getItem(DB_FAVS);   return d?JSON.parse(d):[]; }
function saveFavs(f)   { localStorage.setItem(DB_FAVS,JSON.stringify(f)); }
function getConfig()   { const d=localStorage.getItem(DB_CFG);    return d?Object.assign({},DEFAULT_CONFIG,JSON.parse(d)):Object.assign({},DEFAULT_CONFIG); }
function saveConfig(c) { localStorage.setItem(DB_CFG,JSON.stringify(c)); }

function initData() { if(!getModels()) saveModels(DEMO_MODELS); }

function toggleFav(id) {
  let f=getFavs(); const i=f.indexOf(id);
  if(i>-1) f.splice(i,1); else f.push(id);
  saveFavs(f); return f.includes(id);
}
function isFav(id){ return getFavs().includes(id); }

function injectNav() {
  const cfg=getConfig();
  ['nav-wa','nav-wa2'].forEach(id=>{const e=document.getElementById(id);if(e)e.href=cfg.waLink;});
  ['nav-tg','nav-tg2'].forEach(id=>{const e=document.getElementById(id);if(e)e.href=cfg.tgLink;});
  const p=document.getElementById('nav-phone'); if(p) p.textContent=cfg.phone;
}

function staggerIn(sel,delay=60){
  document.querySelectorAll(sel).forEach((el,i)=>{
    el.style.opacity='0'; el.style.transform='translateY(28px)';
    el.style.transition=`opacity .55s ease ${i*delay}ms, transform .55s ease ${i*delay}ms`;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ el.style.opacity='1'; el.style.transform='translateY(0)'; }));
  });
}

function initNav() {
  const cfg = getConfig();
  // inject contact links
  ['nav-wa','drawer-wa'].forEach(id => { const e=document.getElementById(id); if(e) e.href=cfg.waLink; });
  ['nav-tg','drawer-tg'].forEach(id => { const e=document.getElementById(id); if(e) e.href=cfg.tgLink; });
  // fav badges
  updateAllFavBadges();
}
function updateAllFavBadges() {
  const n = getFavs().length;
  const pill = document.getElementById('fav-badge');
  if (pill) { pill.textContent = n; pill.style.display = n > 0 ? 'inline-flex' : 'none'; }
  const mob = document.getElementById('mob-fav-badge');
  if (mob) mob.textContent = n > 0 ? `(${n})` : '';
  const ml = document.getElementById('mob-fav-link');
  if (ml) ml.style.color = n > 0 ? 'var(--gold)' : 'var(--dim)';
}
function toggleDrawer() {
  const drawer = document.getElementById('nav-drawer');
  const burger = document.getElementById('nav-burger');
  const isOpen = drawer.classList.contains('open');
  drawer.classList.toggle('open', !isOpen);
  burger.classList.toggle('open', !isOpen);
  document.body.style.overflow = isOpen ? '' : 'hidden';
}
// close drawer on outside click
document.addEventListener('click', e => {
  const drawer = document.getElementById('nav-drawer');
  const burger = document.getElementById('nav-burger');
  if (drawer && drawer.classList.contains('open')) {
    if (!drawer.contains(e.target) && !burger.contains(e.target)) {
      drawer.classList.remove('open');
      burger.classList.remove('open');
      document.body.style.overflow = '';
    }
  }
});


function initScrollTop() {
  const btn = document.getElementById('scroll-top');
  if (!btn) return;
  window.addEventListener('scroll', () => btn.classList.toggle('visible', window.scrollY > 350));
}

function init() {
  initData();
  initNav();
  initScrollTop();
  render();
  setTimeout(()=>document.getElementById('page-loader').classList.add('hidden'),800);
}

function render() {
  const favIds=getFavs();
  const all=getModels()||[];
  const favMs=all.filter(m=>favIds.includes(m.id));
  const cfg=getConfig();

  const lbl=document.getElementById('fav-count-lbl');
  const cb=document.getElementById('clear-btn');
  if(lbl) lbl.textContent=`${favIds.length} saved`;
  if(cb) cb.style.display=favIds.length?'inline-block':'none';
  updateAllFavBadges();

  const grid=document.getElementById('fav-grid');
  if(!favMs.length) {
    grid.innerHTML=`<div style="grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;padding:5rem 2rem;text-align:center;">
      <div style="font-size:3rem;opacity:.2;color:var(--red)">♡</div>
      <div style="font-size:.85rem;font-weight:500;letter-spacing:.22em;color:var(--dim);text-transform:uppercase;">No favourites yet</div>
      <div style="font-family:var(--font-s);font-style:italic;font-size:1rem;color:var(--dim2);">Browse our models and click ♡ to save them here</div>
      <a href="index.html" class="btn-primary" style="margin-top:.5rem">Browse Models</a>
    </div>`;
    return;
  }

  grid.innerHTML=favMs.map(m=>{
    const waNum=(m.wa||cfg.wa).replace(/[^0-9]/g,'');
    const tgUser=(m.tg||cfg.tg).replace('@','');
    const bgStyle=m.photos&&m.photos[0]?`background-image:url('${m.photos[0]}');`:'';
    const hasCls=m.photos&&m.photos[0]?'has-photo':'';
    const tag=m.tag?`<span class="chip chip-${m.tag}">${m.tag.toUpperCase()}</span>`:'';
    const avail=m.available?`<span class="avail-dot">Available</span>`:'';
    return `<div class="model-card" onclick="window.location='profile.html?id=${m.id}'">
      <div class="card-bg ${hasCls}" style="${bgStyle}"></div>
      <div class="card-icon"><svg width="90" height="90" viewBox="0 0 24 24" fill="white"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
      <div class="card-vignette"></div>
      <div class="card-top">
        <div class="card-tags">${tag}${avail}</div>
        <button class="card-fav active" onclick="event.stopPropagation();removeFav(${m.id})">♥</button>
      </div>
      <div class="card-bottom">
        <div class="card-name">${m.name.toUpperCase()}</div>
        <div class="card-tagline">${m.tagline||''}</div>
        <div class="card-meta"><span>${m.age} yrs</span><span>${m.height} cm</span><span>${m.nationality}</span></div>
        <div><span class="price-pill">1h — ${m.price1h||0} AED</span></div>
        <div class="card-actions">
          <button class="card-btn-view" onclick="event.stopPropagation();window.location='profile.html?id=${m.id}'">View Profile</button>
          <a class="card-wa" href="https://wa.me/${waNum}" onclick="event.stopPropagation()" target="_blank">${WA_ICO}</a>
          <a class="card-tg" href="https://t.me/${tgUser}" onclick="event.stopPropagation()" target="_blank">${TG_ICO}</a>
        </div>
      </div>
    </div>`;
  }).join('');
  staggerIn('.model-card',50);
}

function removeFav(id) { toggleFav(id); render(); }
function clearAll() { if(!confirm('Remove all favourites?'))return; saveFavs([]); render(); }

init();
</script>
