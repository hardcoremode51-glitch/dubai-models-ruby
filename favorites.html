<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#060306">
<title>Favourites — RUBY AGENCY</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Barlow:wght@300;400;500&display=swap');

/* ── Variables ── */
:root {
  --black:  #060306;
  --black2: #0d070b;
  --black3: #160d12;
  --black4: #1e1118;
  --red:    #d4213c;
  --red2:   #b01830;
  --red3:   #e03050;
  --ruby:   #9b1535;
  --red-glow: rgba(212,33,60,.35);
  --gold:   #d4a843;
  --gold2:  #f0c96a;
  --white:  #fff5f7;
  --off:    #f0e0e5;
  --text:   #e8d0d8;
  --dim:    #c4a0b0;
  --dim2:   #906070;
  --border: rgba(212,33,60,.3);
  --border2: rgba(212,33,60,.55);
  --wa:     #25d366;
  --tg:     #2aabee;
  --font-d: 'Bebas Neue', sans-serif;
  --font-s: 'Cormorant Garamond', serif;
  --font-b: 'Barlow', sans-serif;
  /* NAV height including safe-area — used everywhere */
  --nav-h: calc(64px + env(safe-area-inset-top, 0px));
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--black); color: var(--text);
  font-family: var(--font-b); font-weight: 400;
  min-height: 100vh; -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
a { text-decoration: none; color: inherit; }
button { cursor: pointer; font-family: var(--font-b); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--black); }
::-webkit-scrollbar-thumb { background: var(--red); }

/* Grain overlay */
body::after {
  content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
  opacity: .28;
}

/* ── LOADER ── */
#page-loader {
  position: fixed; inset: 0; z-index: 10000;
  background: var(--black);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem;
  transition: opacity .5s ease, visibility .5s ease;
}
#page-loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.loader-gem { width: 54px; height: 54px; animation: gemSpin 1.4s ease-in-out infinite; }
@keyframes gemSpin { 0%{transform:rotate(0deg)scale(1)} 50%{transform:rotate(180deg)scale(1.15)} 100%{transform:rotate(360deg)scale(1)} }
.loader-name { font-family: var(--font-d); font-size: 1.8rem; letter-spacing: .25em; color: var(--white); }
.loader-bar { width: 180px; height: 2px; background: rgba(212,33,60,.2); position: relative; overflow: hidden; }
.loader-bar::after {
  content: ''; position: absolute; left: -60%; top: 0; width: 60%; height: 100%;
  background: linear-gradient(90deg,transparent,var(--red),transparent);
  animation: loaderSlide 1.2s ease-in-out infinite;
}
@keyframes loaderSlide { 0%{left:-60%} 100%{left:120%} }

/* ── NAV — THE ONE TRUE DEFINITION ── */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 900;
  /* total height = 64px content + notch */
  padding-top: env(safe-area-inset-top, 0px);
  height: var(--nav-h);
  display: flex;
  align-items: flex-end;
  padding-bottom: 0;
  padding-left: 2rem;
  padding-right: 2rem;
  background: rgba(6,3,6,.98);
  border-bottom: 2px solid var(--border2);
  box-shadow: 0 2px 20px rgba(212,33,60,.12);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
/* inner wrapper — always 64px, content vertically centered */
.nav-inner {
  width: 100%;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
/* spacer pushes content below fixed nav */
.nav-spacer {
  display: block;
  width: 100%;
  height: var(--nav-h);
  flex-shrink: 0;
}

.nav-logo {
  display: flex; align-items: center; gap: .6rem;
  font-family: var(--font-d); font-size: 1.5rem; letter-spacing: .18em;
  color: var(--white); flex-shrink: 0; transition: opacity .2s;
}
.nav-logo:hover { opacity: .85; }
.nav-logo span { color: var(--red3); }

/* desktop links */
.nav-links-desktop {
  display: flex; align-items: center; gap: 1.8rem; flex: 1; justify-content: center;
}
.nav-links-desktop a {
  font-size: .72rem; font-weight: 500; letter-spacing: .2em;
  text-transform: uppercase; color: var(--dim);
  transition: color .2s; white-space: nowrap;
}
.nav-links-desktop a:hover,
.nav-links-desktop a.active { color: var(--white); }
.nav-links-desktop a.active { border-bottom: 2px solid var(--red); padding-bottom: 2px; }

/* desktop right */
.nav-cta-desktop {
  display: flex; align-items: center; gap: .55rem; flex-shrink: 0;
}

/* fav pill */
.fav-pill {
  display: none;
  min-width: 18px; height: 18px; padding: 0 5px;
  background: var(--red); border-radius: 9px;
  font-size: .58rem; font-weight: 500; color: #fff;
  align-items: center; justify-content: center;
  margin-left: .3rem; vertical-align: middle;
}

/* ── BURGER ── */
.nav-burger {
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 5px; width: 40px; height: 40px;
  background: transparent; border: 2px solid rgba(212,33,60,.45);
  cursor: pointer; flex-shrink: 0; transition: border-color .2s;
}
.nav-burger:hover { border-color: var(--red3); }
.nav-burger span {
  display: block; width: 20px; height: 2px;
  background: var(--text); transition: all .28s;
  transform-origin: center;
}
.nav-burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.nav-burger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.nav-burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* mob fav icon */
.mob-fav-icon {
  display: none;
  font-size: 1.5rem; line-height: 1; color: var(--dim);
  text-decoration: none; padding: .2rem .4rem;
  transition: color .2s; flex-shrink: 0;
}
.mob-fav-icon.has-items { color: var(--gold); }

/* ── MOBILE NAV BREAKPOINT ── */
@media(max-width:700px) {
  .nav { padding-left: 1rem; padding-right: 1rem; }
  .nav-links-desktop { display: none; }
  .nav-cta-desktop { display: none; }
  .nav-burger { display: flex; }
  .mob-fav-icon { display: block; }
}

/* ── DRAWER ── */
.nav-drawer {
  position: fixed;
  top: var(--nav-h);
  left: 0; right: 0; bottom: 0;
  z-index: 850;
  background: rgba(6,3,6,.99);
  border-top: 2px solid var(--border);
  padding: 2rem 1.5rem;
  flex-direction: column;
  overflow-y: auto;
  /* closed by default */
  display: none;
  pointer-events: none;
}
.nav-drawer.open {
  display: flex;
  pointer-events: auto;
  animation: drawerIn .25s ease forwards;
}
@keyframes drawerIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.drawer-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 1.2rem; font-family: var(--font-d); letter-spacing: .1em;
  color: var(--text); text-decoration: none; transition: color .2s;
}
.drawer-item:hover { color: var(--white); }
.drawer-item.active { color: var(--red3); }
.drawer-section-label {
  font-size: .6rem; font-weight: 500; letter-spacing: .3em;
  color: var(--dim2); text-transform: uppercase; margin-top: 1.5rem; margin-bottom: .8rem;
}
.drawer-cta { display: flex; flex-direction: column; gap: .8rem; }
.drawer-cta a {
  display: flex; align-items: center; justify-content: center;
  gap: .7rem; padding: 1rem; font-size: .78rem; font-weight: 500; letter-spacing: .15em;
  text-transform: uppercase; border: 2px solid; transition: all .2s;
}
.drawer-cta .dwa { border-color: rgba(37,211,102,.7); color: var(--wa); background: rgba(37,211,102,.08); }
.drawer-cta .dwa:hover { background: rgba(37,211,102,.2); }
.drawer-cta .dtg { border-color: rgba(42,171,238,.7); color: var(--tg); background: rgba(42,171,238,.08); }
.drawer-cta .dtg:hover { background: rgba(42,171,238,.2); }

/* ── BUTTONS ── */
.btn-wa, .btn-tg {
  display: inline-flex; align-items: center; gap: .5rem;
  padding: .5rem 1.1rem;
  font-size: .7rem; font-weight: 500; letter-spacing: .15em; text-transform: uppercase;
  border: 2px solid; transition: all .22s; white-space: nowrap; font-family: var(--font-b);
}
.btn-wa { border-color: rgba(37,211,102,.7); color: var(--wa); background: rgba(37,211,102,.1); }
.btn-wa:hover { background: rgba(37,211,102,.22); box-shadow: 0 0 16px rgba(37,211,102,.2); }
.btn-tg { border-color: rgba(42,171,238,.7); color: var(--tg); background: rgba(42,171,238,.1); }
.btn-tg:hover { background: rgba(42,171,238,.22); box-shadow: 0 0 16px rgba(42,171,238,.2); }
.btn-primary {
  display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
  padding: .75rem 2rem; background: var(--red); border: 2px solid var(--red);
  color: var(--white); font-size: .75rem; font-weight: 500; letter-spacing: .2em; text-transform: uppercase;
  transition: all .22s; box-shadow: 0 0 24px var(--red-glow); font-family: var(--font-b);
}
.btn-primary:hover { background: var(--red2); }
.btn-outline {
  display: inline-flex; align-items: center; justify-content: center;
  padding: .75rem 2rem; background: transparent; border: 2px solid var(--border2);
  color: var(--text); font-size: .75rem; font-weight: 500; letter-spacing: .2em; text-transform: uppercase;
  transition: all .22s; font-family: var(--font-b);
}
.btn-outline:hover { border-color: var(--red3); color: var(--white); }

/* ── CHIPS/TAGS ── */
.chip {
  display: inline-block; padding: .2rem .7rem;
  font-size: .6rem; font-weight: 500; letter-spacing: .18em; text-transform: uppercase;
  border: 2px solid;
}
.chip-vip       { border-color: var(--gold); color: var(--gold2); background: rgba(212,168,67,.12); }
.chip-new       { border-color: var(--red3); color: #ff8090;     background: rgba(212,33,60,.12); }
.chip-hot       { border-color: #ff7040;     color: #ff9060;      background: rgba(255,100,50,.1); }
.chip-exclusive { border-color: #c0a0ff;     color: #d0b8ff;      background: rgba(160,120,255,.1); }

/* ── AVAILABLE DOT ── */
.avail-dot {
  display: inline-flex; align-items: center; gap: .4rem;
  font-size: .65rem; font-weight: 500; letter-spacing: .14em; color: #4ade80;
}
.avail-dot::before {
  content: ''; width: 7px; height: 7px; border-radius: 50%;
  background: #4ade80; box-shadow: 0 0 8px #4ade80;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

/* ── SCROLL TOP ── */
.scroll-top {
  position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 400;
  width: 44px; height: 44px;
  background: var(--red); border: 2px solid var(--red3);
  color: var(--white); font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: translateY(10px);
  transition: opacity .3s, transform .3s;
  pointer-events: none; box-shadow: 0 4px 16px var(--red-glow);
}
.scroll-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
.scroll-top:hover { background: var(--red2); }

/* ── FORM ELEMENTS ── */
.form-field { display: flex; flex-direction: column; gap: .4rem; }
.form-label { font-size: .68rem; font-weight: 500; letter-spacing: .2em; text-transform: uppercase; color: var(--dim); }
.form-input, .form-select, .form-textarea {
  background: rgba(212,33,60,.07); border: 2px solid var(--border);
  color: var(--white); padding: .7rem 1rem;
  font-family: var(--font-b); font-size: .88rem; outline: none;
  transition: border .22s, background .22s; width: 100%;
}
.form-input::placeholder { color: var(--dim2); }
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--red3); background: rgba(212,33,60,.12);
}
.form-select option { background: var(--black3); color: var(--white); }
.form-textarea { resize: vertical; min-height: 95px; }


.fav-header {
  padding: 2.5rem 2rem 1.8rem;
  border-bottom: 2px solid var(--border2);
  display: flex; justify-content: space-between; align-items: flex-end; gap: 1rem; flex-wrap: wrap;
}
@media(max-width:640px) { .fav-header { padding: 1.5rem 1rem 1.2rem; } }
.fav-title {
  font-family: var(--font-d);
  font-size: clamp(2.2rem,6vw,4rem);
  letter-spacing: .06em; line-height: 1; color: var(--white);
}
.fav-title em { color: var(--red3); font-style: normal; }
.fav-sub { font-family: var(--font-s); font-style: italic; font-size: .95rem; color: var(--dim); margin-top: .35rem; }

/* Same grid + cards as index */
.models-grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 2px; padding: 2px 0 5rem;
}
@media(max-width:1200px) { .models-grid { grid-template-columns: repeat(3,1fr); } }
@media(max-width:820px)  { .models-grid { grid-template-columns: repeat(2,1fr); } }
@media(max-width:520px)  { .models-grid { grid-template-columns: 1fr; } }
.model-card {
  position: relative; overflow: hidden; aspect-ratio: 9/16;
  cursor: pointer; background: var(--black3);
}
.card-bg {
  position: absolute; inset: 0;
  background: linear-gradient(155deg,#200810,#3a0f1e,#120408);
  background-size: cover; background-position: center top;
  transition: transform .6s cubic-bezier(.25,.46,.45,.94);
}
.model-card:hover .card-bg { transform: scale(1.06); }
.card-vignette {
  position: absolute; inset: 0;
  background: linear-gradient(0deg, rgba(6,3,6,.97) 0%, rgba(6,3,6,.65) 35%, rgba(6,3,6,.15) 60%, transparent 100%);
}
.card-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.card-placeholder svg { opacity: .07; }
.card-top {
  position: absolute; top: .9rem; left: .9rem; right: .9rem;
  display: flex; justify-content: space-between; align-items: flex-start; z-index: 3;
}
.card-tags { display: flex; gap: .35rem; flex-wrap: wrap; align-items: center; }
.card-fav {
  background: rgba(244,63,94,.18); border: 2px solid rgba(244,63,94,.65);
  width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
  font-size: .95rem; color: #f43f5e; cursor: pointer; flex-shrink: 0; transition: all .2s;
}
.card-fav:hover { background: rgba(244,63,94,.35); }
.card-bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 1.4rem 1.1rem 1.1rem; z-index: 3;
}
.card-name {
  font-family: var(--font-d); font-size: 2rem; letter-spacing: .06em; line-height: 1;
  color: var(--white); margin-bottom: .25rem;
}
.card-tagline {
  font-family: var(--font-s); font-style: italic;
  font-size: .86rem; color: var(--off); margin-bottom: .55rem; line-height: 1.4;
}
.card-meta {
  display: flex; gap: .7rem; flex-wrap: wrap;
  font-size: .66rem; font-weight: 500; letter-spacing: .12em;
  color: var(--text); text-transform: uppercase; margin-bottom: .65rem;
}
.price-pill {
  display: inline-block; margin-right: .35rem; margin-bottom: .3rem; padding: .24rem .7rem;
  border: 2px solid rgba(212,168,67,.55); background: rgba(212,168,67,.1);
  font-size: .63rem; font-weight: 500; color: var(--gold2);
}
.card-actions { display: flex; gap: .45rem; flex-wrap: wrap; }
.card-view-btn {
  padding: .48rem 1.1rem; background: var(--red); border: 2px solid var(--red);
  color: var(--white); font-size: .66rem; font-weight: 500; letter-spacing: .18em; text-transform: uppercase;
  font-family: var(--font-b); cursor: pointer; transition: background .2s;
}
.card-view-btn:hover { background: var(--red2); }
@media(hover:none) {
  .card-view-btn { width: 100%; text-align: center; }
}
/* empty state */
.empty-wrap {
  padding: 5rem 2rem; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 1.2rem;
}
.empty-heart { font-size: 3.5rem; opacity: .2; color: var(--red); }
.empty-title { font-size: .85rem; font-weight: 500; letter-spacing: .22em; color: var(--dim); text-transform: uppercase; }
.empty-sub { font-family: var(--font-s); font-style: italic; font-size: .95rem; color: var(--dim2); }

</style>
</head>

function updateAllFavBadges() {
  const n = getFavs().length;

  const drawer = document.getElementById('nav-drawer');
  const burger = document.getElementById('nav-burger');
  const isOpen = drawer.classList.contains('open');
  drawer.classList.toggle('open', !isOpen);
  burger.classList.toggle('open', !isOpen);
  document.body.style.overflow = isOpen ? '' : 'hidden';
}
// close drawer on outside click

  const drawer = document.getElementById('nav-drawer');
  const burger = document.getElementById('nav-burger');
  if (drawer && drawer.classList.contains('open')) {

      drawer.classList.remove('open');
      burger.classList.remove('open');
      document.body.style.overflow = '';
    }
  }
});

function init() {
  initData();
  initNav();
  initScrollTop();
  render();
  setTimeout(() => document.getElementById('page-loader').classList.add('hidden'), 800);
}

function render() {
  const favIds = getFavs();
  const all = getModels() || [];
  const favMs = all.filter(m => favIds.includes(m.id));
  const cfg = getConfig();

  updateFavBadge();
  const lbl = document.getElementById('fav-count'); if (lbl) lbl.textContent = favIds.length + ' saved';
  const cb  = document.getElementById('clear-btn');  if (cb)  cb.style.display = favIds.length ? 'inline-flex' : 'none';

  const grid = document.getElementById('fav-grid');
  if (!favMs.length) {
    grid.innerHTML = `<div class="empty-wrap">
      <div class="empty-heart">♡</div>
      <div class="empty-title">No favourites yet</div>
      <div class="empty-sub">Browse our models and tap ♡ to save them here</div>
      <a href="index.html" class="btn-primary" style="margin-top:.5rem">Browse Models</a>
    </div>`;
    return;
  }

  grid.innerHTML = favMs.map(m => {
    const waNum  = (m.wa || cfg.wa).replace(/[^0-9]/g,'');
    const tgUser = (m.tg || cfg.tg).replace('@','');
    const bg     = m.photos && m.photos[0] ? `background-image:url('${m.photos[0]}')` : '';
    const tag    = m.tag ? `<span class="chip chip-${m.tag}">${m.tag.toUpperCase()}</span>` : '';
    const avail  = m.available ? `<span class="avail-dot">Available</span>` : '';
    return `<div class="model-card" onclick="location.href='profile.html?id=${m.id}'">
      <div class="card-bg" style="${bg}"></div>
      <div class="card-placeholder"><svg width="80" height="80" viewBox="0 0 24 24" fill="white"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
      <div class="card-vignette"></div>
      <div class="card-top">
        <div class="card-tags">${tag}${avail}</div>
        <button class="card-fav" onclick="event.stopPropagation();removeFav(${m.id})">♥</button>
      </div>
      <div class="card-bottom">
        <div class="card-name">${m.name.toUpperCase()}</div>
        <div class="card-tagline">${m.tagline||''}</div>
        <div class="card-meta"><span>${m.age} yrs</span><span>${m.height} cm</span><span>${m.nationality}</span></div>
        <div><span class="price-pill">1h — ${m.price1h||0} AED</span></div>
        <div class="card-actions">
          <button class="card-view-btn" onclick="event.stopPropagation();location.href='profile.html?id=${m.id}'">View Profile</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // stagger
  grid.querySelectorAll('.model-card').forEach((el,i) => {
    el.style.opacity='0'; el.style.transform='translateY(20px)';
    el.style.transition=`opacity .5s ease ${i*50}ms, transform .5s ease ${i*50}ms`;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{el.style.opacity='1';el.style.transform='translateY(0)'}));
  });
}

function removeFav(id) { toggleFav(id); render(); }
function clearAll() { if (!confirm('Remove all favourites?')) return; saveFavs([]); render(); }

init();

</script>
