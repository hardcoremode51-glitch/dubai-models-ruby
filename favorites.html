<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="theme-color" content="#060306">
<title>Favourites — RUBY AGENCY</title>
<style>/* ============================================================
   RUBY AGENCY — Shared Styles v2
   High contrast · Dark cinematic · Ruby red + black + gold
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Barlow:wght@300;400;500&display=swap');

:root {
  --black:   #060306;
  --black2:  #0d070b;
  --black3:  #160d12;
  --black4:  #1e1118;
  --red:     #d4213c;
  --red2:    #b01830;
  --red3:    #e03050;
  --ruby:    #9b1535;
  --red-glow:rgba(212,33,60,.35);
  --gold:    #d4a843;
  --gold2:   #f0c96a;
  --white:   #fff5f7;
  --off:     #f0e0e5;
  --text:    #e8d0d8;          /* main readable text — brighter */
  --dim:     #c4a0b0;          /* secondary text — visible */
  --dim2:    #906070;          /* tertiary — still readable */
  --border:  rgba(212,33,60,.35);
  --border2: rgba(212,33,60,.6);
  --borderg: rgba(212,168,67,.3);
  --wa:      #25d366;
  --tg:      #2aabee;
  --font-d:  'Bebas Neue', sans-serif;
  --font-s:  'Cormorant Garamond', serif;
  --font-b:  'Barlow', sans-serif;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--black); color:var(--text);
  font-family:var(--font-b); font-weight:400;
  min-height:100vh; -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* grain */
body::after{
  content:''; position:fixed; inset:0; z-index:9999; pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
  opacity:.3;
}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;font-family:var(--font-b);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--black);}
::-webkit-scrollbar-thumb{background:var(--red);}

/* ─── LOADER ─────────────────────────────────── */
#page-loader{
  position:fixed; inset:0; z-index:10000;
  background:var(--black);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.5rem;
  transition:opacity .5s ease, visibility .5s ease;
}
#page-loader.hidden{opacity:0; visibility:hidden;}
.loader-gem{
  width:54px; height:54px;
  animation: gemSpin 1.4s ease-in-out infinite;
}
@keyframes gemSpin{
  0%{transform:rotate(0deg) scale(1);}
  50%{transform:rotate(180deg) scale(1.15);}
  100%{transform:rotate(360deg) scale(1);}
}
.loader-name{
  font-family:var(--font-d); font-size:1.8rem; letter-spacing:.25em;
  color:var(--white); opacity:.9;
}
.loader-bar{
  width:180px; height:2px; background:rgba(212,33,60,.2); position:relative; overflow:hidden;
}
.loader-bar::after{
  content:''; position:absolute; left:-60%; top:0; width:60%; height:100%;
  background:linear-gradient(90deg, transparent, var(--red), transparent);
  animation:loaderSlide 1.2s ease-in-out infinite;
}
@keyframes loaderSlide{0%{left:-60%;}100%{left:120%;}}

/* ─── RUBY GEM SVG LOGO ─────────────────────── */
.ruby-gem{display:inline-block; vertical-align:middle; flex-shrink:0;}

/* ─── NAV ────────────────────────────────────── */
.nav{
  position:fixed; top:0; left:0; right:0; z-index:500;
  display:flex; justify-content:space-between; align-items:center;
  padding:0 2.5rem; height:68px;
  background:rgba(6,3,6,.97);
  border-bottom:1px solid var(--border2);
  box-shadow:0 2px 30px rgba(212,33,60,.15);
}
.nav-logo{
  display:flex; align-items:center; gap:.7rem;
  font-family:var(--font-d); font-size:1.55rem; letter-spacing:.18em;
  color:var(--white); transition:opacity .2s;
}
.nav-logo:hover{opacity:.85;}
.nav-logo-text span{color:var(--red3);}
.nav-links{display:flex; gap:1.8rem; align-items:center;}
.nav-links a{
  font-size:.72rem; font-weight:500; letter-spacing:.22em; text-transform:uppercase;
  color:var(--dim); transition:color .2s; white-space:nowrap;
}
.nav-links a:hover,.nav-links a.active{color:var(--white);}
.nav-links a.active{border-bottom:1px solid var(--red);}
.nav-right{display:flex; gap:.6rem; align-items:center;}

/* ─── CONVERSION BUTTONS ─────────────────────── */
.btn-wa,.btn-tg{
  display:inline-flex; align-items:center; gap:.5rem;
  padding:.52rem 1.15rem;
  font-size:.7rem; font-weight:500; letter-spacing:.15em; text-transform:uppercase;
  border:2px solid; transition:all .25s; white-space:nowrap;
}
.btn-wa{border-color:rgba(37,211,102,.7); color:var(--wa); background:rgba(37,211,102,.1);}
.btn-wa:hover{background:rgba(37,211,102,.22); border-color:var(--wa); box-shadow:0 0 16px rgba(37,211,102,.25);}
.btn-tg{border-color:rgba(42,171,238,.7); color:var(--tg); background:rgba(42,171,238,.1);}
.btn-tg:hover{background:rgba(42,171,238,.22); border-color:var(--tg); box-shadow:0 0 16px rgba(42,171,238,.25);}

.btn-primary{
  display:inline-flex; align-items:center; justify-content:center; gap:.5rem;
  padding:.75rem 2rem; background:var(--red); border:2px solid var(--red);
  color:var(--white); font-size:.75rem; font-weight:500; letter-spacing:.2em; text-transform:uppercase;
  transition:all .25s; box-shadow:0 0 24px var(--red-glow);
}
.btn-primary:hover{background:var(--red2); border-color:var(--red2); box-shadow:0 0 40px var(--red-glow);}

.btn-outline{
  display:inline-flex; align-items:center; justify-content:center;
  padding:.75rem 2rem; background:transparent;
  border:2px solid var(--border2); color:var(--text);
  font-size:.75rem; font-weight:500; letter-spacing:.2em; text-transform:uppercase;
  transition:all .25s;
}
.btn-outline:hover{border-color:var(--red3); color:var(--white);}

/* ─── TAGS / CHIPS ───────────────────────────── */
.chip{
  display:inline-block; padding:.22rem .75rem;
  font-size:.62rem; font-weight:500; letter-spacing:.18em; text-transform:uppercase;
  border:2px solid;
}
.chip-vip      {border-color:var(--gold); color:var(--gold2); background:rgba(212,168,67,.12);}
.chip-new      {border-color:var(--red3); color:#ff8090;      background:rgba(212,33,60,.12);}
.chip-hot      {border-color:#ff7040;     color:#ff9060;       background:rgba(255,100,50,.1);}
.chip-exclusive{border-color:#c0a0ff;     color:#d0b8ff;       background:rgba(160,120,255,.1);}

/* ─── AVAILABLE DOT ─────────────────────────── */
.avail-dot{
  display:inline-flex; align-items:center; gap:.4rem;
  font-size:.65rem; font-weight:500; letter-spacing:.14em; color:#4ade80;
}
.avail-dot::before{
  content:''; width:7px; height:7px; border-radius:50%;
  background:#4ade80; box-shadow:0 0 8px #4ade80;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}

/* ─── SECTION DIVIDER ───────────────────────── */
.section-divider{
  height:2px; margin:0;
  background:linear-gradient(90deg, var(--red) 0%, var(--gold) 50%, var(--red) 100%);
  opacity:.5;
}

/* ─── FORMS ──────────────────────────────────── */
.form-field{display:flex; flex-direction:column; gap:.4rem;}
.form-label{font-size:.68rem; font-weight:500; letter-spacing:.2em; text-transform:uppercase; color:var(--dim);}
.form-input,.form-select,.form-textarea{
  background:rgba(212,33,60,.07); border:2px solid var(--border);
  color:var(--white); padding:.7rem 1rem;
  font-family:var(--font-b); font-size:.88rem; font-weight:400;
  outline:none; transition:border .25s, background .25s; width:100%;
}
.form-input::placeholder{color:var(--dim2);}
.form-input:focus,.form-select:focus,.form-textarea:focus{
  border-color:var(--red3); background:rgba(212,33,60,.12);
}
.form-select option{background:var(--black3); color:var(--white);}
.form-textarea{resize:vertical; min-height:95px;}

/* ─── UPLOAD ZONE ───────────────────────────── */
.upload-zone{
  border:2px dashed var(--border2); padding:2rem;
  text-align:center; position:relative; transition:.25s; cursor:pointer;
}
.upload-zone:hover{border-color:var(--red3); background:rgba(212,33,60,.06);}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-zone-text{font-size:.75rem; color:var(--dim); letter-spacing:.1em;}
.upload-thumbs{display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.8rem;}
.upload-thumb{width:64px; height:84px; object-fit:cover; border:2px solid var(--border);}

/* ─── SCROLL TO TOP ─────────────────────────── */
.scroll-top{
  position:fixed; bottom:1.8rem; right:1.8rem; z-index:400;
  width:46px; height:46px;
  background:var(--red); border:2px solid var(--red3);
  color:var(--white); font-size:1.1rem;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transform:translateY(12px);
  transition:opacity .3s, transform .3s, background .2s;
  pointer-events:none; box-shadow:0 4px 20px var(--red-glow);
}
.scroll-top.visible{opacity:1; transform:translateY(0); pointer-events:auto;}
.scroll-top:hover{background:var(--red2);}


.float-btn{
  display:flex; align-items:center; gap:.6rem;
  padding:.72rem 1.25rem; border:2px solid;
  font-size:.7rem; font-weight:500; letter-spacing:.14em; text-transform:uppercase;
  font-family:var(--font-b); box-shadow:0 4px 20px rgba(0,0,0,.6);
  transition:transform .2s, box-shadow .2s, background .2s;
}
.float-btn:hover{transform:translateY(-2px); box-shadow:0 8px 28px rgba(0,0,0,.7);}
.float-btn-wa{background:rgba(29,168,81,.9); border-color:#1da851; color:#fff;}
.float-btn-wa:hover{background:#1da851;}
.float-btn-tg{background:rgba(0,136,204,.85); border-color:#0088cc; color:#fff;}
.float-btn-tg:hover{background:#0088cc;}

/* ─── RESPONSIVE NAV ─────────────────────────── */
@media(max-width:900px){
  .nav{padding:0 1.2rem; height:62px;}
  .nav-links .hide-md{display:none;}
}
@media(max-width:640px){
  .nav-links{gap:1rem;}
  .nav-links .hide-sm{display:none;}
  .nav-right .btn-tg{display:none;}
  .float-cta{bottom:1rem; left:1rem;}
  .scroll-top{bottom:1rem; right:1rem;}
}

@media(max-width:640px){
  .nav{height:58px !important;padding:0 1rem !important;}
  .nav-logo{font-size:1.3rem !important;gap:.5rem !important;}
  .nav-links{gap:.8rem !important;}
  .nav-links a{font-size:.68rem !important;}
  .nav-right .btn-tg{display:none !important;}
  .nav-right .btn-wa{padding:.4rem .75rem !important;font-size:.62rem !important;}
}
</style>
<style>
.fav-header{padding:2.5rem 2.5rem 1.8rem;border-bottom:2px solid var(--border2);display:flex;justify-content:space-between;align-items:flex-end;gap:1rem;flex-wrap:wrap;}
.fav-title{font-family:var(--font-d);font-size:clamp(2.5rem,6vw,4.5rem);letter-spacing:.06em;line-height:1;color:var(--white);}
.fav-title span{color:var(--red3);}
.fav-sub{font-family:var(--font-s);font-style:italic;font-size:1rem;color:var(--dim);margin-top:.4rem;}

.clear-btn{padding:.42rem 1rem;background:transparent;border:2px solid rgba(244,63,94,.45);color:#f87171;font-size:.68rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;font-family:var(--font-b);transition:all .22s;}
.clear-btn:hover{border-color:#f43f5e;color:#f43f5e;}
.models-grid{padding:1.5rem 2.5rem 5rem;display:grid;grid-template-columns:repeat(4,1fr);gap:2px;}
@media(max-width:1200px){.models-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:820px){.models-grid{grid-template-columns:repeat(2,1fr);padding:1rem 1rem 4rem;}}
@media(max-width:420px){.models-grid{grid-template-columns:1fr 1fr;padding:.7rem .7rem 3.5rem;gap:1.5px;}}
@media(max-width:640px){.fav-header{padding:1.5rem 1rem 1.2rem;}}
.model-card{position:relative;overflow:hidden;aspect-ratio:2/3;cursor:pointer;background:var(--black3);}
.card-bg{position:absolute;inset:0;transition:transform .65s cubic-bezier(.25,.46,.45,.94);background:linear-gradient(155deg,#200810,#3a0f1e,#120408);}
.card-bg.has-photo{background-size:cover!important;background-position:center top!important;}
.model-card:hover .card-bg{transform:scale(1.07);}
.card-vignette{position:absolute;inset:0;background:linear-gradient(0deg,rgba(6,3,6,.98) 0%,rgba(6,3,6,.7) 30%,rgba(6,3,6,.2) 55%,transparent 100%);}
.card-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.card-icon svg{opacity:.07;}
.card-top{position:absolute;top:1rem;left:1rem;right:1rem;display:flex;justify-content:space-between;align-items:flex-start;}
.card-tags{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;}
.card-fav{background:rgba(244,63,94,.18);border:2px solid rgba(244,63,94,.7);width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#f43f5e;transition:all .22s;}
.card-fav:hover{background:rgba(244,63,94,.3);}
.card-bottom{position:absolute;bottom:0;left:0;right:0;padding:1.5rem 1.2rem 1.2rem;}
.card-name{font-family:var(--font-d);font-size:2rem;letter-spacing:.06em;line-height:1;color:var(--white);margin-bottom:.3rem;text-shadow:0 2px 12px rgba(0,0,0,.8);}
@media(max-width:420px){.card-name{font-size:1.5rem;}}
.card-tagline{font-family:var(--font-s);font-style:italic;font-size:.85rem;color:var(--off);margin-bottom:.6rem;line-height:1.4;text-shadow:0 1px 8px rgba(0,0,0,.9);}
.card-meta{display:flex;gap:.8rem;flex-wrap:wrap;font-size:.68rem;font-weight:500;letter-spacing:.12em;color:var(--text);text-transform:uppercase;margin-bottom:.8rem;}
.card-actions{display:flex;gap:.5rem;flex-wrap:wrap;opacity:0;transform:translateY(12px);transition:opacity .3s,transform .3s;pointer-events:none;}
.model-card:hover .card-actions{opacity:1;transform:translateY(0);pointer-events:auto;}
@media(hover:none){.card-actions{opacity:1!important;transform:none!important;pointer-events:auto!important;}}
.card-btn-view{padding:.52rem 1.2rem;background:var(--red);border:2px solid var(--red);color:var(--white);font-size:.68rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;font-family:var(--font-b);transition:background .2s;}
.card-btn-view:hover{background:var(--red2);}
.card-wa,.card-tg{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:2px solid;transition:all .2s;flex-shrink:0;}
.card-wa{border-color:rgba(37,211,102,.7);color:var(--wa);background:rgba(37,211,102,.12);}
.card-wa:hover{background:rgba(37,211,102,.25);}
.card-tg{border-color:rgba(42,171,238,.7);color:var(--tg);background:rgba(42,171,238,.12);}
.card-tg:hover{background:rgba(42,171,238,.25);}
.empty-state{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;padding:5rem 2rem;text-align:center;}
.empty-icon{font-size:3.5rem;opacity:.25;color:var(--red);}
.empty-text{font-size:.85rem;font-weight:500;letter-spacing:.22em;color:var(--dim);text-transform:uppercase;}
.empty-sub{font-family:var(--font-s);font-style:italic;font-size:1rem;color:var(--dim2);}
</style>
</head>
