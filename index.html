<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><meta name="theme-color" content="#060306"><title>RUBY AGENCY</title><style>

@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Barlow:wght@300;400;500&display=swap');

/* ── Variables ── */
:root {
  --black:  #060306;
  --black2: #0d070b;
  --black3: #160d12;
  --black4: #1e1118;
  --red:    #d4213c;
  --red2:   #b01830;
  --red3:   #e03050;
  --ruby:   #9b1535;
  --red-glow: rgba(212,33,60,.35);
  --gold:   #d4a843;
  --gold2:  #f0c96a;
  --white:  #fff5f7;
  --off:    #f0e0e5;
  --text:   #e8d0d8;
  --dim:    #c4a0b0;
  --dim2:   #906070;
  --border: rgba(212,33,60,.3);
  --border2: rgba(212,33,60,.55);
  --wa:     #25d366;
  --tg:     #2aabee;
  --font-d: 'Bebas Neue', sans-serif;
  --font-s: 'Cormorant Garamond', serif;
  --font-b: 'Barlow', sans-serif;
  /* NAV height including safe-area — used everywhere */
  --nav-h: calc(64px + env(safe-area-inset-top, 0px));
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--black); color: var(--text);
  font-family: var(--font-b); font-weight: 400;
  min-height: 100vh; -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
a { text-decoration: none; color: inherit; }
button { cursor: pointer; font-family: var(--font-b); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--black); }
::-webkit-scrollbar-thumb { background: var(--red); }

/* Grain overlay */
body::after {
  content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
  opacity: .28;
}

/* ── LOADER ── */
#page-loader {
  position: fixed; inset: 0; z-index: 10000;
  background: var(--black);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem;
  transition: opacity .5s ease, visibility .5s ease;
}
#page-loader.hidden, #page-loader.gone { opacity: 0; visibility: hidden; pointer-events: none; }
.loader-gem { width: 54px; height: 54px; animation: gemSpin 1.4s ease-in-out infinite; }
@keyframes gemSpin { 0%{transform:rotate(0deg)scale(1)} 50%{transform:rotate(180deg)scale(1.15)} 100%{transform:rotate(360deg)scale(1)} }
.loader-name { font-family: var(--font-d); font-size: 1.8rem; letter-spacing: .25em; color: var(--white); }
.loader-bar { width: 180px; height: 2px; background: rgba(212,33,60,.2); position: relative; overflow: hidden; }
.loader-bar::after {
  content: ''; position: absolute; left: -60%; top: 0; width: 60%; height: 100%;
  background: linear-gradient(90deg,transparent,var(--red),transparent);
  animation: loaderSlide 1.2s ease-in-out infinite;
}
@keyframes loaderSlide { 0%{left:-60%} 100%{left:120%} }

/* ── NAV — THE ONE TRUE DEFINITION ── */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 900;
  /* total height = 64px content + notch */
  padding-top: env(safe-area-inset-top, 0px);
  height: var(--nav-h);
  display: flex;
  align-items: flex-end;
  padding-bottom: 0;
  padding-left: 2rem;
  padding-right: 2rem;
  background: rgba(6,3,6,.98);
  border-bottom: 2px solid var(--border2);
  box-shadow: 0 2px 20px rgba(212,33,60,.12);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
/* inner wrapper — always 64px, content vertically centered */
.nav-inner {
  width: 100%;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
/* spacer pushes content below fixed nav */
.nav-spacer {
  display: block;
  width: 100%;
  height: var(--nav-h);
  flex-shrink: 0;
}

.nav-logo {
  display: flex; align-items: center; gap: .6rem;
  font-family: var(--font-d); font-size: 1.5rem; letter-spacing: .18em;
  color: var(--white); flex-shrink: 0; transition: opacity .2s;
}
.nav-logo:hover { opacity: .85; }
.nav-logo span { color: var(--red3); }

/* desktop links */
.nav-links-desktop {
  display: flex; align-items: center; gap: 1.8rem; flex: 1; justify-content: center;
}
.nav-links-desktop a {
  font-size: .72rem; font-weight: 500; letter-spacing: .2em;
  text-transform: uppercase; color: var(--dim);
  transition: color .2s; white-space: nowrap;
}
.nav-links-desktop a:hover,
.nav-links-desktop a.active { color: var(--white); }
.nav-links-desktop a.active { border-bottom: 2px solid var(--red); padding-bottom: 2px; }

/* desktop right */
.nav-cta-desktop {
  display: flex; align-items: center; gap: .55rem; flex-shrink: 0;
}

/* fav pill */
.fav-pill {
  display: none;
  min-width: 18px; height: 18px; padding: 0 5px;
  background: var(--red); border-radius: 9px;
  font-size: .58rem; font-weight: 500; color: #fff;
  align-items: center; justify-content: center;
  margin-left: .3rem; vertical-align: middle;
}

/* ── BURGER ── */
.nav-burger {
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 5px; width: 40px; height: 40px;
  background: transparent; border: 2px solid rgba(212,33,60,.45);
  cursor: pointer; flex-shrink: 0; transition: border-color .2s;
}
.nav-burger:hover { border-color: var(--red3); }
.nav-burger span {
  display: block; width: 20px; height: 2px;
  background: var(--text); transition: all .28s;
  transform-origin: center;
}
.nav-burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.nav-burger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.nav-burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* mob fav icon */
.mob-fav-icon {
  display: none;
  font-size: 1.5rem; line-height: 1; color: var(--dim);
  text-decoration: none; padding: .2rem .4rem;
  transition: color .2s; flex-shrink: 0;
}
.mob-fav-icon.has-items { color: var(--gold); }

/* ── MOBILE NAV BREAKPOINT ── */
@media(max-width:700px) {
  .nav { padding-left: 1rem; padding-right: 1rem; }
  .nav-links-desktop { display: none; }
  .nav-cta-desktop { display: none; }
  .nav-burger { display: flex; }
  .mob-fav-icon { display: block; }
}

/* ── DRAWER ── */
.nav-drawer {
  position: fixed;
  top: var(--nav-h);
  left: 0; right: 0; bottom: 0;
  z-index: 850;
  background: rgba(6,3,6,.99);
  border-top: 2px solid var(--border);
  padding: 2rem 1.5rem;
  flex-direction: column;
  overflow-y: auto;
  /* closed by default */
  display: none;
  pointer-events: none;
}
.nav-drawer.open {
  display: flex;
  pointer-events: auto;
  animation: drawerIn .25s ease forwards;
}
@keyframes drawerIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.drawer-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 1.2rem; font-family: var(--font-d); letter-spacing: .1em;
  color: var(--text); text-decoration: none; transition: color .2s;
}
.drawer-item:hover { color: var(--white); }
.drawer-item.active { color: var(--red3); }
.drawer-section-label {
  font-size: .6rem; font-weight: 500; letter-spacing: .3em;
  color: var(--dim2); text-transform: uppercase; margin-top: 1.5rem; margin-bottom: .8rem;
}
.drawer-cta { display: flex; flex-direction: column; gap: .8rem; }
.drawer-cta a {
  display: flex; align-items: center; justify-content: center;
  gap: .7rem; padding: 1rem; font-size: .78rem; font-weight: 500; letter-spacing: .15em;
  text-transform: uppercase; border: 2px solid; transition: all .2s;
}
.drawer-cta .dwa { border-color: rgba(37,211,102,.7); color: var(--wa); background: rgba(37,211,102,.08); }
.drawer-cta .dwa:hover { background: rgba(37,211,102,.2); }
.drawer-cta .dtg { border-color: rgba(42,171,238,.7); color: var(--tg); background: rgba(42,171,238,.08); }
.drawer-cta .dtg:hover { background: rgba(42,171,238,.2); }

/* ── BUTTONS ── */
.btn-wa, .btn-tg {
  display: inline-flex; align-items: center; gap: .5rem;
  padding: .5rem 1.1rem;
  font-size: .7rem; font-weight: 500; letter-spacing: .15em; text-transform: uppercase;
  border: 2px solid; transition: all .22s; white-space: nowrap; font-family: var(--font-b);
}
.btn-wa { border-color: rgba(37,211,102,.7); color: var(--wa); background: rgba(37,211,102,.1); }
.btn-wa:hover { background: rgba(37,211,102,.22); box-shadow: 0 0 16px rgba(37,211,102,.2); }
.btn-tg { border-color: rgba(42,171,238,.7); color: var(--tg); background: rgba(42,171,238,.1); }
.btn-tg:hover { background: rgba(42,171,238,.22); box-shadow: 0 0 16px rgba(42,171,238,.2); }
.btn-primary {
  display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
  padding: .75rem 2rem; background: var(--red); border: 2px solid var(--red);
  color: var(--white); font-size: .75rem; font-weight: 500; letter-spacing: .2em; text-transform: uppercase;
  transition: all .22s; box-shadow: 0 0 24px var(--red-glow); font-family: var(--font-b);
}
.btn-primary:hover { background: var(--red2); }
.btn-outline {
  display: inline-flex; align-items: center; justify-content: center;
  padding: .75rem 2rem; background: transparent; border: 2px solid var(--border2);
  color: var(--text); font-size: .75rem; font-weight: 500; letter-spacing: .2em; text-transform: uppercase;
  transition: all .22s; font-family: var(--font-b);
}
.btn-outline:hover { border-color: var(--red3); color: var(--white); }

/* ── CHIPS/TAGS ── */
.chip {
  display: inline-block; padding: .2rem .7rem;
  font-size: .6rem; font-weight: 500; letter-spacing: .18em; text-transform: uppercase;
  border: 2px solid;
}
.chip-vip       { border-color: var(--gold); color: var(--gold2); background: rgba(212,168,67,.12); }
.chip-new       { border-color: var(--red3); color: #ff8090;     background: rgba(212,33,60,.12); }
.chip-hot       { border-color: #ff7040;     color: #ff9060;      background: rgba(255,100,50,.1); }
.chip-exclusive { border-color: #c0a0ff;     color: #d0b8ff;      background: rgba(160,120,255,.1); }

/* ── AVAILABLE DOT ── */
.avail-dot {
  display: inline-flex; align-items: center; gap: .4rem;
  font-size: .65rem; font-weight: 500; letter-spacing: .14em; color: #4ade80;
}
.avail-dot::before {
  content: ''; width: 7px; height: 7px; border-radius: 50%;
  background: #4ade80; box-shadow: 0 0 8px #4ade80;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

/* ── SCROLL TOP ── */
.scroll-top {
  position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 400;
  width: 44px; height: 44px;
  background: var(--red); border: 2px solid var(--red3);
  color: var(--white); font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: translateY(10px);
  transition: opacity .3s, transform .3s;
  pointer-events: none; box-shadow: 0 4px 16px var(--red-glow);
}
.scroll-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
.scroll-top:hover { background: var(--red2); }

/* ── FORM ELEMENTS ── */
.form-field { display: flex; flex-direction: column; gap: .4rem; }
.form-label { font-size: .68rem; font-weight: 500; letter-spacing: .2em; text-transform: uppercase; color: var(--dim); }
.form-input, .form-select, .form-textarea {
  background: rgba(212,33,60,.07); border: 2px solid var(--border);
  color: var(--white); padding: .7rem 1rem;
  font-family: var(--font-b); font-size: .88rem; outline: none;
  transition: border .22s, background .22s; width: 100%;
}
.form-input::placeholder { color: var(--dim2); }
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--red3); background: rgba(212,33,60,.12);
}
.form-select option { background: var(--black3); color: var(--white); }
.form-textarea { resize: vertical; min-height: 95px; }


/* top info bar */
.top-bar {
  background: var(--black2); border-bottom: 2px solid var(--border2);
  padding: .5rem 2rem;
  display: flex; justify-content: space-between; align-items: center; gap: 1rem;
  font-size: .68rem; font-weight: 500; letter-spacing: .22em; color: var(--dim); text-transform: uppercase;
}
@media(max-width:700px) { .top-bar { display: none; } }

/* ── FILTERS ── */
.filters-bar {
  position: sticky;
  top: var(--nav-h);
  z-index: 800;
  background: rgba(6,3,6,.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 2px solid var(--border);
}
.filters-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: .75rem 2rem; gap: .8rem; cursor: pointer; user-select: none;
}
@media(max-width:700px) { .filters-top { padding: .7rem 1rem; } }
.filter-active-lbl {
  font-size: .68rem; font-weight: 500; letter-spacing: .2em;
  color: var(--gold); text-transform: uppercase; flex: 1;
}
.count-badge { font-size: .65rem; font-weight: 500; color: var(--dim); white-space: nowrap; }
.filter-toggle {
  display: flex; align-items: center; gap: .5rem;
  background: transparent; border: 2px solid var(--border);
  color: var(--dim); font-size: .66rem; font-weight: 500;
  letter-spacing: .18em; text-transform: uppercase;
  padding: .36rem .85rem; font-family: var(--font-b); cursor: pointer;
  transition: border-color .2s, color .2s;
}
.filter-toggle:hover, .filter-toggle.open { border-color: var(--red3); color: var(--white); }
.filter-toggle.open { background: rgba(212,33,60,.1); }
.filter-arrow { transition: transform .25s; display: inline-block; }
.filters-panel {
  display: none; flex-wrap: wrap; gap: .5rem;
  padding: .6rem 2rem 1rem; border-top: 1px solid var(--border);
}
.filters-panel.open { display: flex; }
@media(max-width:700px) { .filters-panel { padding: .6rem 1rem 1rem; } }
.filter-btn {
  white-space: nowrap;
  padding: .4rem .95rem;
  background: transparent; border: 2px solid rgba(212,33,60,.35);
  color: var(--dim); font-size: .67rem; font-weight: 500; letter-spacing: .16em; text-transform: uppercase;
  transition: all .2s; font-family: var(--font-b); cursor: pointer;
}
.filter-btn:hover { border-color: var(--red3); color: var(--text); }
.filter-btn.active { border-color: var(--red3); color: var(--white); background: rgba(212,33,60,.2); }

/* ── GRID ── */
.models-grid {
  display: grid;
  grid-template-columns: repeat(5,1fr);
  gap: 2px;
  padding: 2px 0 5rem;
}
@media(max-width:1400px) { .models-grid { grid-template-columns: repeat(4,1fr); } }
@media(max-width:1050px) { .models-grid { grid-template-columns: repeat(3,1fr); } }
@media(max-width:680px)  { .models-grid { grid-template-columns: repeat(2,1fr); } }
@media(max-width:420px)  { .models-grid { grid-template-columns: 1fr; } }

.model-card {
  position: relative;
  overflow: hidden;
  aspect-ratio: 3/4;
  cursor: pointer;
  background: var(--black3);
}
.model-card.wide { grid-column: span 2; }
@media(max-width:520px) { .model-card.wide { grid-column: span 1; } }

.card-bg {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center top;
  transition: transform .6s ease;
}
.model-card:hover .card-bg { transform: scale(1.06); }

.card-ph {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(155deg,#200810 0%,#3a0f1e 55%,#120408 100%);
}
.card-ph svg { opacity: .12; }

.card-vignette {
  position: absolute; inset: 0;
  background: linear-gradient(0deg,rgba(6,3,6,.97) 0%,rgba(6,3,6,.55) 38%,rgba(6,3,6,.05) 68%,transparent 100%);
}

.card-top {
  position: absolute; top: .85rem; left: .85rem; right: .85rem;
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: .4rem; z-index: 3;
}
.card-tags { display: flex; gap: .35rem; flex-wrap: wrap; align-items: center; }

.card-fav-btn {
  background: rgba(6,3,6,.55); border: 2px solid rgba(255,255,255,.18);
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  font-size: .9rem; color: rgba(255,255,255,.35);
  transition: all .2s; flex-shrink: 0; cursor: pointer; line-height: 1;
}
.card-fav-btn:hover, .card-fav-btn.active {
  color: #f43f5e; border-color: rgba(244,63,94,.6); background: rgba(244,63,94,.18);
}

.card-bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 1.2rem 1rem 1rem; z-index: 3;
}
.card-name {
  font-family: var(--font-d); font-size: clamp(1.2rem,2.5vw,1.9rem);
  letter-spacing: .06em; line-height: 1; color: var(--white); margin-bottom: .2rem;
  text-shadow: 0 2px 10px rgba(0,0,0,.8);
}
.card-tagline {
  font-family: var(--font-s); font-style: italic;
  font-size: .82rem; color: var(--off); margin-bottom: .45rem; line-height: 1.4;
}
.card-meta {
  display: flex; gap: .55rem; flex-wrap: wrap;
  font-size: .62rem; font-weight: 500; letter-spacing: .12em;
  color: var(--text); text-transform: uppercase; margin-bottom: .5rem;
}
.card-meta span::after { content: '·'; margin-left: .55rem; opacity: .35; }
.card-meta span:last-child::after { content: ''; }

.price-pill {
  display: inline-block; margin-right: .3rem; margin-bottom: .25rem;
  padding: .2rem .6rem; border: 1.5px solid rgba(212,168,67,.45);
  background: rgba(212,168,67,.08); font-size: .6rem; font-weight: 500;
  color: var(--gold2); letter-spacing: .08em;
}

.card-actions {
  display: flex; gap: .35rem; flex-wrap: wrap;
  opacity: 0; transform: translateY(8px);
  transition: opacity .25s, transform .25s; pointer-events: none;
}
.model-card:hover .card-actions { opacity: 1; transform: translateY(0); pointer-events: auto; }

.card-view-btn {
  padding: .42rem .95rem; background: var(--red); border: 2px solid var(--red);
  color: var(--white); font-size: .62rem; font-weight: 500;
  letter-spacing: .18em; text-transform: uppercase; font-family: var(--font-b);
  cursor: pointer; transition: background .2s;
}
.card-view-btn:hover { background: var(--red2); }

.card-icon-btn {
  width: 32px; height: 32px; display: flex; align-items: center;
  justify-content: center; border: 2px solid; transition: all .2s; text-decoration: none;
}
.card-iwa { border-color: rgba(37,211,102,.5); color: var(--wa); background: rgba(37,211,102,.07); }
.card-iwa:hover { background: rgba(37,211,102,.2); }
.card-itg { border-color: rgba(42,171,238,.5); color: var(--tg); background: rgba(42,171,238,.07); }
.card-itg:hover { background: rgba(42,171,238,.2); }

@media(hover:none) {
  .card-actions { opacity: 1; transform: none; pointer-events: auto; }
  .card-icon-btn { display: none; }
  .card-view-btn { width: 100%; text-align: center; }
}

/* chips */
.chip { display:inline-block; padding:.18rem .52rem; font-size:.56rem; font-weight:600; letter-spacing:.18em; text-transform:uppercase; }
.chip-vip       { background:rgba(212,168,67,.15); border:1.5px solid rgba(212,168,67,.7); color:var(--gold2); }
.chip-new       { background:rgba(42,171,238,.12); border:1.5px solid rgba(42,171,238,.7); color:#60d4f7; }
.chip-hot       { background:rgba(212,33,60,.15);  border:1.5px solid var(--red3);          color:var(--red3); }
.chip-exclusive { background:rgba(168,85,247,.12); border:1.5px solid rgba(168,85,247,.7); color:#d8b4fe; }
.avail-dot { font-size:.58rem; font-weight:500; letter-spacing:.14em; color:#4ade80; text-transform:uppercase; padding:.18rem .5rem; background:rgba(74,222,128,.1); border:1.5px solid rgba(74,222,128,.4); }

function toggleFilters() {
  var p=document.getElementById('filters-panel'), t=document.querySelector('.filter-toggle'), a=document.querySelector('.filter-arrow');
  var open=p.classList.toggle('open'); if(t)t.classList.toggle('open',open); if(a)a.style.transform=open?'rotate(180deg)':'';
}
function initFilters() {
  document.querySelectorAll('.filter-btn').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active'); currentFilter=btn.dataset.filter;
      var lbl=document.getElementById('filter-active-lbl'); if(lbl)lbl.textContent=btn.dataset.label||'All';
      renderGrid(currentFilter);
      if(window.innerWidth<=700){var p=document.getElementById('filters-panel'),t=document.querySelector('.filter-toggle'),a=document.querySelector('.filter-arrow');if(p)p.classList.remove('open');if(t)t.classList.remove('open');if(a)a.style.transform='';}
    });
  });
}
function renderGrid(filter) {
  var models=getModels()||[];
  var list=filter==='all'?models:filter==='available'?models.filter(function(m){return m.available;}):models.filter(function(m){return m.tag===filter;});
  var ce=document.getElementById('count-badge'); if(ce)ce.textContent=list.length+' model'+(list.length!==1?'s':'');
  var grid=document.getElementById('models-grid');
  if(!list.length){grid.innerHTML='<div class="empty-state">No models found</div>';return;}
  grid.innerHTML=list.map(function(m,i){return buildCard(m,i);}).join('');
  staggerIn('.model-card',55);
  grid.querySelectorAll('.card-fav-btn').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var id=parseInt(btn.dataset.id), active=toggleFav(id);
      btn.classList.toggle('active',active); btn.textContent=active?'♥':'♡'; updateFavBadge();
    });
  });
}
function buildCard(m,i) {
  var cfg=getConfig(), favActive=isFav(m.id);
  var tag=m.tag?'<span class="chip chip-'+m.tag+'">'+m.tag.toUpperCase()+'</span>':'';
  var avail=m.available?'<span class="avail-dot">Available Now</span>':'';
  var bg=m.photos&&m.photos[0]?"background-image:url('"+m.photos[0]+"')":"";
  var waNum=(m.wa||cfg.wa).replace(/[^0-9]/g,''), tgUser=(m.tg||cfg.tg).replace('@','');
  var cls=i===0?' wide':'';
  return '<div class="model-card'+cls+'" onclick="location.href=\'profile.html?id=' + m.id + '\'">'
    +'<div class="card-bg" style="'+bg+'"></div>'
    +'<div class="card-ph"><svg width="80" height="80" viewBox="0 0 24 24" fill="white"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>'
    +'<div class="card-vignette"></div>'
    +'<div class="card-top"><div class="card-tags">'+tag+avail+'</div>'
    +'<button class="card-fav-btn'+(favActive?' active':'')+'" data-id="'+m.id+'">'+(favActive?'♥':'♡')+'</button></div>'
    +'<div class="card-bottom">'
    +'<div class="card-name">'+m.name.toUpperCase()+'</div>'
    +'<div class="card-tagline">'+(m.tagline||'')+'</div>'
    +'<div class="card-meta"><span>'+m.age+' yrs</span><span>'+m.height+' cm</span><span>'+m.nationality+'</span></div>'
    +'<div><span class="price-pill">1h — '+(m.price1h||0)+' AED</span><span class="price-pill">2h — '+(m.price2h||0)+' AED</span></div>'
    +'<div class="card-actions">'
    +'<button class="card-view-btn" onclick="event.stopPropagation();location.href=\'profile.html?id=' + m.id + '\'\">View Profile</button>'
    +'<a class="card-icon-btn card-iwa" href="https://wa.me/'+waNum+'" onclick="event.stopPropagation()" target="_blank">'+WA_ICO+'</a>'
    +'<a class="card-icon-btn card-itg" href="https://t.me/'+tgUser+'" onclick="event.stopPropagation()" target="_blank">'+TG_ICO+'</a>'
    +'</div></div></div>';
  var _l=document.getElementById('page-loader'); if(_l) _l.classList.add('hidden');
}
init();
</script></body></html>
