<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="theme-color" content="#060306">
<title>RUBY AGENCY — Premium Companions Dubai</title>
<style>/* ============================================================
   RUBY AGENCY — Shared Styles v2
   High contrast · Dark cinematic · Ruby red + black + gold
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Barlow:wght@300;400;500&display=swap');

:root {
  --black:   #060306;
  --black2:  #0d070b;
  --black3:  #160d12;
  --black4:  #1e1118;
  --red:     #d4213c;
  --red2:    #b01830;
  --red3:    #e03050;
  --ruby:    #9b1535;
  --red-glow:rgba(212,33,60,.35);
  --gold:    #d4a843;
  --gold2:   #f0c96a;
  --white:   #fff5f7;
  --off:     #f0e0e5;
  --text:    #e8d0d8;          /* main readable text — brighter */
  --dim:     #c4a0b0;          /* secondary text — visible */
  --dim2:    #906070;          /* tertiary — still readable */
  --border:  rgba(212,33,60,.35);
  --border2: rgba(212,33,60,.6);
  --borderg: rgba(212,168,67,.3);
  --wa:      #25d366;
  --tg:      #2aabee;
  --font-d:  'Bebas Neue', sans-serif;
  --font-s:  'Cormorant Garamond', serif;
  --font-b:  'Barlow', sans-serif;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--black); color:var(--text);
  font-family:var(--font-b); font-weight:400;
  min-height:100vh; -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* grain */
body::after{
  content:''; position:fixed; inset:0; z-index:9999; pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
  opacity:.3;
}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;font-family:var(--font-b);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--black);}
::-webkit-scrollbar-thumb{background:var(--red);}

/* ─── LOADER ─────────────────────────────────── */
#page-loader{
  position:fixed; inset:0; z-index:10000;
  background:var(--black);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.5rem;
  transition:opacity .5s ease, visibility .5s ease;
}
#page-loader.hidden{opacity:0; visibility:hidden;}
.loader-gem{
  width:54px; height:54px;
  animation: gemSpin 1.4s ease-in-out infinite;
}
@keyframes gemSpin{
  0%{transform:rotate(0deg) scale(1);}
  50%{transform:rotate(180deg) scale(1.15);}
  100%{transform:rotate(360deg) scale(1);}
}
.loader-name{
  font-family:var(--font-d); font-size:1.8rem; letter-spacing:.25em;
  color:var(--white); opacity:.9;
}
.loader-bar{
  width:180px; height:2px; background:rgba(212,33,60,.2); position:relative; overflow:hidden;
}
.loader-bar::after{
  content:''; position:absolute; left:-60%; top:0; width:60%; height:100%;
  background:linear-gradient(90deg, transparent, var(--red), transparent);
  animation:loaderSlide 1.2s ease-in-out infinite;
}
@keyframes loaderSlide{0%{left:-60%;}100%{left:120%;}}

/* ─── RUBY GEM SVG LOGO ─────────────────────── */
.ruby-gem{display:inline-block; vertical-align:middle; flex-shrink:0;}

/* ─── NAV ────────────────────────────────────── */
.nav{
  position:fixed; top:0; left:0; right:0; z-index:500;
  display:flex; justify-content:space-between; align-items:center;
  padding:0 2.5rem; height:68px;
  background:rgba(6,3,6,.97);
  border-bottom:1px solid var(--border2);
  box-shadow:0 2px 30px rgba(212,33,60,.15);
}
.nav-logo{
  display:flex; align-items:center; gap:.7rem;
  font-family:var(--font-d); font-size:1.55rem; letter-spacing:.18em;
  color:var(--white); transition:opacity .2s;
}
.nav-logo:hover{opacity:.85;}
.nav-logo-text span{color:var(--red3);}
.nav-links{display:flex; gap:1.8rem; align-items:center;}
.nav-links a{
  font-size:.72rem; font-weight:500; letter-spacing:.22em; text-transform:uppercase;
  color:var(--dim); transition:color .2s; white-space:nowrap;
}
.nav-links a:hover,.nav-links a.active{color:var(--white);}
.nav-links a.active{border-bottom:1px solid var(--red);}
.nav-right{display:flex; gap:.6rem; align-items:center;}

/* ─── CONVERSION BUTTONS ─────────────────────── */
.btn-wa,.btn-tg{
  display:inline-flex; align-items:center; gap:.5rem;
  padding:.52rem 1.15rem;
  font-size:.7rem; font-weight:500; letter-spacing:.15em; text-transform:uppercase;
  border:2px solid; transition:all .25s; white-space:nowrap;
}
.btn-wa{border-color:rgba(37,211,102,.7); color:var(--wa); background:rgba(37,211,102,.1);}
.btn-wa:hover{background:rgba(37,211,102,.22); border-color:var(--wa); box-shadow:0 0 16px rgba(37,211,102,.25);}
.btn-tg{border-color:rgba(42,171,238,.7); color:var(--tg); background:rgba(42,171,238,.1);}
.btn-tg:hover{background:rgba(42,171,238,.22); border-color:var(--tg); box-shadow:0 0 16px rgba(42,171,238,.25);}

.btn-primary{
  display:inline-flex; align-items:center; justify-content:center; gap:.5rem;
  padding:.75rem 2rem; background:var(--red); border:2px solid var(--red);
  color:var(--white); font-size:.75rem; font-weight:500; letter-spacing:.2em; text-transform:uppercase;
  transition:all .25s; box-shadow:0 0 24px var(--red-glow);
}
.btn-primary:hover{background:var(--red2); border-color:var(--red2); box-shadow:0 0 40px var(--red-glow);}

.btn-outline{
  display:inline-flex; align-items:center; justify-content:center;
  padding:.75rem 2rem; background:transparent;
  border:2px solid var(--border2); color:var(--text);
  font-size:.75rem; font-weight:500; letter-spacing:.2em; text-transform:uppercase;
  transition:all .25s;
}
.btn-outline:hover{border-color:var(--red3); color:var(--white);}

/* ─── TAGS / CHIPS ───────────────────────────── */
.chip{
  display:inline-block; padding:.22rem .75rem;
  font-size:.62rem; font-weight:500; letter-spacing:.18em; text-transform:uppercase;
  border:2px solid;
}
.chip-vip      {border-color:var(--gold); color:var(--gold2); background:rgba(212,168,67,.12);}
.chip-new      {border-color:var(--red3); color:#ff8090;      background:rgba(212,33,60,.12);}
.chip-hot      {border-color:#ff7040;     color:#ff9060;       background:rgba(255,100,50,.1);}
.chip-exclusive{border-color:#c0a0ff;     color:#d0b8ff;       background:rgba(160,120,255,.1);}

/* ─── AVAILABLE DOT ─────────────────────────── */
.avail-dot{
  display:inline-flex; align-items:center; gap:.4rem;
  font-size:.65rem; font-weight:500; letter-spacing:.14em; color:#4ade80;
}
.avail-dot::before{
  content:''; width:7px; height:7px; border-radius:50%;
  background:#4ade80; box-shadow:0 0 8px #4ade80;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}

/* ─── SECTION DIVIDER ───────────────────────── */
.section-divider{
  height:2px; margin:0;
  background:linear-gradient(90deg, var(--red) 0%, var(--gold) 50%, var(--red) 100%);
  opacity:.5;
}

/* ─── FORMS ──────────────────────────────────── */
.form-field{display:flex; flex-direction:column; gap:.4rem;}
.form-label{font-size:.68rem; font-weight:500; letter-spacing:.2em; text-transform:uppercase; color:var(--dim);}
.form-input,.form-select,.form-textarea{
  background:rgba(212,33,60,.07); border:2px solid var(--border);
  color:var(--white); padding:.7rem 1rem;
  font-family:var(--font-b); font-size:.88rem; font-weight:400;
  outline:none; transition:border .25s, background .25s; width:100%;
}
.form-input::placeholder{color:var(--dim2);}
.form-input:focus,.form-select:focus,.form-textarea:focus{
  border-color:var(--red3); background:rgba(212,33,60,.12);
}
.form-select option{background:var(--black3); color:var(--white);}
.form-textarea{resize:vertical; min-height:95px;}

/* ─── UPLOAD ZONE ───────────────────────────── */
.upload-zone{
  border:2px dashed var(--border2); padding:2rem;
  text-align:center; position:relative; transition:.25s; cursor:pointer;
}
.upload-zone:hover{border-color:var(--red3); background:rgba(212,33,60,.06);}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-zone-text{font-size:.75rem; color:var(--dim); letter-spacing:.1em;}
.upload-thumbs{display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.8rem;}
.upload-thumb{width:64px; height:84px; object-fit:cover; border:2px solid var(--border);}

/* ─── SCROLL TO TOP ─────────────────────────── */
.scroll-top{
  position:fixed; bottom:1.8rem; right:1.8rem; z-index:400;
  width:46px; height:46px;
  background:var(--red); border:2px solid var(--red3);
  color:var(--white); font-size:1.1rem;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transform:translateY(12px);
  transition:opacity .3s, transform .3s, background .2s;
  pointer-events:none; box-shadow:0 4px 20px var(--red-glow);
}
.scroll-top.visible{opacity:1; transform:translateY(0); pointer-events:auto;}
.scroll-top:hover{background:var(--red2);}

/* ─── FLOAT CTA BUTTONS ──────────────────────── */
.float-cta{
  position:fixed; bottom:1.8rem; left:1.8rem; z-index:399;
  display:flex; flex-direction:column; gap:.55rem;
}
.float-btn{
  display:flex; align-items:center; gap:.6rem;
  padding:.72rem 1.25rem; border:2px solid;
  font-size:.7rem; font-weight:500; letter-spacing:.14em; text-transform:uppercase;
  font-family:var(--font-b); box-shadow:0 4px 20px rgba(0,0,0,.6);
  transition:transform .2s, box-shadow .2s, background .2s;
}
.float-btn:hover{transform:translateY(-2px); box-shadow:0 8px 28px rgba(0,0,0,.7);}
.float-btn-wa{background:rgba(29,168,81,.9); border-color:#1da851; color:#fff;}
.float-btn-wa:hover{background:#1da851;}
.float-btn-tg{background:rgba(0,136,204,.85); border-color:#0088cc; color:#fff;}
.float-btn-tg:hover{background:#0088cc;}

/* ─── RESPONSIVE NAV ─────────────────────────── */
@media(max-width:900px){
  .nav{padding:0 1.2rem; height:62px;}
  .nav-links .hide-md{display:none;}
}
@media(max-width:640px){
  .nav-links{gap:1rem;}
  .nav-links .hide-sm{display:none;}
  .nav-right .btn-tg{display:none;}
  .float-cta{bottom:1rem; left:1rem;}
  .scroll-top{bottom:1rem; right:1rem;}
}
</style>
<style>
/* ─── TOP BAR ─────────────────────────────────── */
.top-bar{
  background:var(--black2);
  border-bottom:2px solid var(--border2);
  padding:.55rem 2.5rem;
  display:flex; justify-content:space-between; align-items:center;
  gap:1rem;
}
.top-bar-text{font-size:.68rem; font-weight:500; letter-spacing:.28em; color:var(--dim); text-transform:uppercase;}
.top-bar-cta{display:flex; gap:.5rem; flex-wrap:wrap;}

/* ─── FILTERS ─────────────────────────────────── */
.filters-wrap{
  padding:1.2rem 2.5rem;
  display:flex; justify-content:space-between; align-items:center;
  gap:1rem; flex-wrap:wrap;
  border-bottom:2px solid var(--border);
  position:sticky; top:68px; z-index:100;
  background:rgba(6,3,6,.97); backdrop-filter:blur(14px);
}
.filters-left{display:flex; gap:.5rem; align-items:center; flex-wrap:wrap;}
.filter-label{font-size:.65rem; font-weight:500; letter-spacing:.3em; color:var(--dim); text-transform:uppercase; margin-right:.4rem;}
.filter-btn{
  padding:.42rem 1.05rem;
  background:transparent; border:2px solid rgba(212,33,60,.35);
  color:var(--dim); font-size:.68rem; font-weight:500; letter-spacing:.18em; text-transform:uppercase;
  transition:all .22s; font-family:var(--font-b);
}
.filter-btn:hover{border-color:var(--red3); color:var(--text);}
.filter-btn.active{border-color:var(--red3); color:var(--white); background:rgba(212,33,60,.2);}
.count-label{font-size:.68rem; font-weight:500; letter-spacing:.2em; color:var(--gold); white-space:nowrap;}

/* ─── GRID ─────────────────────────────────────── */
.models-grid{
  padding:1.5rem 2.5rem 5rem;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:2px;
}
@media(max-width:1200px){.models-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:820px) {.models-grid{grid-template-columns:repeat(2,1fr); padding:1rem 1rem 4rem;}}
@media(max-width:420px) {.models-grid{grid-template-columns:1fr 1fr; padding:.7rem .7rem 3.5rem; gap:1.5px;}}

/* ─── CARD ─────────────────────────────────────── */
.model-card{
  position:relative; overflow:hidden;
  aspect-ratio:2/3; cursor:pointer;
  background:var(--black3);
  transition:transform .35s cubic-bezier(.25,.46,.45,.94);
}
.model-card.wide{grid-column:span 2; aspect-ratio:auto; min-height:520px;}
@media(max-width:820px){.model-card.wide{grid-column:span 2; min-height:380px;}}
@media(max-width:420px){.model-card.wide{grid-column:span 2; min-height:280px;}}

.card-bg{
  position:absolute; inset:0;
  transition:transform .65s cubic-bezier(.25,.46,.45,.94);
  background:linear-gradient(155deg,#200810 0%,#3a0f1e 55%,#120408 100%);
}
.card-bg.has-photo{background-size:cover !important; background-position:center top !important;}
.model-card:hover .card-bg{transform:scale(1.07);}

/* strong cinematic vignette */
.card-vignette{
  position:absolute; inset:0;
  background:
    linear-gradient(0deg, rgba(6,3,6,.98) 0%, rgba(6,3,6,.7) 30%, rgba(6,3,6,.25) 55%, rgba(6,3,6,.08) 75%, transparent 100%),
    radial-gradient(ellipse at 50% 100%, rgba(6,3,6,.5) 0%, transparent 60%);
  transition:opacity .35s;
}

/* placeholder icon */
.card-icon{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none;
}
.card-icon svg{opacity:.08;}

.card-top{
  position:absolute; top:1rem; left:1rem; right:1rem;
  display:flex; justify-content:space-between; align-items:flex-start; gap:.5rem;
}
.card-tags{display:flex; gap:.4rem; flex-wrap:wrap; align-items:center;}

.card-fav{
  background:rgba(6,3,6,.7); border:2px solid rgba(255,255,255,.25);
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
  font-size:1rem; color:rgba(255,255,255,.5);
  transition:all .22s; flex-shrink:0;
}
.card-fav:hover,.card-fav.active{color:#f43f5e; border-color:rgba(244,63,94,.7); background:rgba(244,63,94,.18);}

.card-bottom{
  position:absolute; bottom:0; left:0; right:0;
  padding:1.5rem 1.2rem 1.2rem;
}

.card-name{
  font-family:var(--font-d);
  font-size:2.1rem; letter-spacing:.06em; line-height:1;
  color:var(--white); margin-bottom:.3rem;
  text-shadow:0 2px 12px rgba(0,0,0,.8);
}
.model-card.wide .card-name{font-size:2.9rem;}
@media(max-width:420px){.card-name{font-size:1.6rem;} .model-card.wide .card-name{font-size:2rem;}}

.card-tagline{
  font-family:var(--font-s); font-style:italic;
  font-size:.88rem; color:var(--off); margin-bottom:.7rem; line-height:1.4;
  text-shadow:0 1px 8px rgba(0,0,0,.9);
}
@media(max-width:420px){.card-tagline{font-size:.78rem;}}

.card-meta{
  display:flex; gap:.8rem; flex-wrap:wrap;
  font-size:.68rem; font-weight:500; letter-spacing:.14em; color:var(--text);
  text-transform:uppercase; margin-bottom:.9rem;
}
@media(max-width:420px){.card-meta{font-size:.6rem; gap:.6rem;}}

.card-prices{
  display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:.8rem;
}
.price-pill{
  padding:.28rem .8rem;
  border:2px solid rgba(212,168,67,.6); background:rgba(212,168,67,.12);
  font-size:.66rem; font-weight:500; letter-spacing:.1em; color:var(--gold2);
}

/* action row */
.card-actions{
  display:flex; gap:.5rem; flex-wrap:wrap;
  opacity:0; transform:translateY(12px);
  transition:opacity .3s, transform .3s;
  pointer-events:none;
}
.model-card:hover .card-actions{opacity:1; transform:translateY(0); pointer-events:auto;}

/* always show on touch */
@media(hover:none){
  .card-actions{opacity:1 !important; transform:translateY(0) !important; pointer-events:auto !important;}
}

.card-btn-view{
  padding:.52rem 1.2rem; background:var(--red); border:2px solid var(--red);
  color:var(--white); font-size:.68rem; font-weight:500; letter-spacing:.18em; text-transform:uppercase;
  font-family:var(--font-b); transition:background .2s, border-color .2s;
}
.card-btn-view:hover{background:var(--red2); border-color:var(--red2);}

.card-wa,.card-tg{
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
  border:2px solid; transition:all .2s; flex-shrink:0;
}
.card-wa{border-color:rgba(37,211,102,.7); color:var(--wa); background:rgba(37,211,102,.12);}
.card-wa:hover{background:rgba(37,211,102,.25);}
.card-tg{border-color:rgba(42,171,238,.7); color:var(--tg); background:rgba(42,171,238,.12);}
.card-tg:hover{background:rgba(42,171,238,.25);}

/* ─── EMPTY ─────────────────────────────────── */
.empty-state{
  grid-column:1/-1; text-align:center; padding:5rem 2rem;
  color:var(--dim); font-size:.85rem; letter-spacing:.2em; text-transform:uppercase;
}

/* ─── BOTTOM CONTACT BAR ─────────────────────── */
.contact-footer{
  padding:1.8rem 2.5rem;
  background:var(--black2); border-top:2px solid var(--border2);
  display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1.2rem;
}
.cf-item{display:flex; flex-direction:column; gap:.3rem;}
.cf-label{font-size:.62rem; font-weight:500; letter-spacing:.3em; color:var(--dim2); text-transform:uppercase;}
.cf-val{font-size:.88rem; font-weight:500; color:var(--text);}
.cf-btns{display:flex; gap:.6rem; flex-wrap:wrap;}
@media(max-width:640px){.contact-footer{padding:1.2rem 1rem;} .cf-item:last-of-type{display:none;}}
</style>
</head>

<div id="page-loader">
  <div class="loader-gem">
    <svg width="54" height="54" viewBox="0 0 54 54" fill="none">
      <polygon points="27,4 50,18 50,36 27,50 4,36 4,18" fill="#9b1535" stroke="#d4213c" stroke-width="1.5"/>
      <polygon points="27,4 50,18 27,28" fill="#c41e3a" opacity=".9"/>
      <polygon points="27,4 4,18 27,28" fill="#7a1028" opacity=".9"/>

      <polygon points="4,18 4,36 27,28" fill="#6b0d20" opacity=".85"/>
      <polygon points="50,36 27,50 27,28" fill="#b01830" opacity=".9"/>
      <polygon points="4,36 27,50 27,28" fill="#8a1228" opacity=".9"/>
      <polygon points="27,4 50,18 27,28" fill="white" opacity=".08"/>
      <polygon points="27,4 38,11 27,16" fill="white" opacity=".25"/>
    </svg>
  </div>
  <div class="loader-name">RUBY AGENCY</div>
  <div class="loader-bar"></div>
</div>

<!-- TOP BAR -->
<div class="top-bar">
  <span class="top-bar-text">Dubai · Premium Companions · Discreet</span>

  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter=btn.dataset.filter;
      renderGrid(currentFilter);
    });
  });
}

function initScrollTop(){
  const btn=document.getElementById('scroll-top');
  window.addEventListener('scroll',()=>{ btn.classList.toggle('visible',window.scrollY>400); });
}

function renderGrid(filter){
  const models=getModels()||[];
  let list=filter==='all'?models
    :filter==='available'?models.filter(m=>m.available)
    :models.filter(m=>m.tag===filter);
  document.getElementById('model-count').textContent=`${list.length} profile${list.length!==1?'s':''}`;
  const grid=document.getElementById('models-grid');
  if(!list.length){grid.innerHTML='<div class="empty-state">No models found</div>';return;}
  grid.innerHTML=list.map((m,i)=>buildCard(m,i)).join('');
  staggerIn('.model-card',55);
  grid.querySelectorAll('.card-fav').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const id=parseInt(btn.dataset.id);
      const active=toggleFav(id);
      btn.classList.toggle('active',active);
      btn.textContent=active?'♥':'♡';
      updateFavBadge();
    });
  });
}

function buildCard(m,i){
  const cfg=getConfig();
  const isWide=i===0;
  const favActive=isFav(m.id);
  const tag=m.tag?`<span class="chip chip-${m.tag}">${m.tag.toUpperCase()}</span>`:'';
  const avail=m.available?`<span class="avail-dot">Available Now</span>`:'';
  const bgStyle=m.photos&&m.photos[0]?`background-image:url('${m.photos[0]}');`:'';
  const hasCls=m.photos&&m.photos[0]?'has-photo':'';
  const waNum=(m.wa||cfg.wa).replace(/[^0-9]/g,'');
  const tgUser=(m.tg||cfg.tg).replace('@','');
  const waLink=`https://wa.me/${waNum}`;
  const tgLink=`https://t.me/${tgUser}`;

  <div class="model-card${isWide?' wide':''}" onclick="window.location='profile.html?id=${m.id}'">
    <div class="card-bg ${hasCls}" style="${bgStyle}"></div>
    <div class="card-icon"><svg width="90" height="90" viewBox="0 0 24 24" fill="white"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
    <div class="card-vignette"></div>
    <div class="card-top">
      <div class="card-tags">${tag}${avail}</div>
      <button class="card-fav ${favActive?'active':''}" data-id="${m.id}">${favActive?'♥':'♡'}</button>
    </div>
    <div class="card-bottom">
      <div class="card-name">${m.name.toUpperCase()}</div>
      <div class="card-tagline">${m.tagline||''}</div>
      <div class="card-meta">
        <span>${m.age} yrs</span>
        <span>${m.height} cm</span>
        <span>${m.nationality}</span>
      </div>
      <div class="card-prices">
        <span class="price-pill">1h — ${price1h} AED</span>
        <span class="price-pill">2h — ${price2h} AED</span>
      </div>
      <div class="card-actions">
        <button class="card-btn-view" onclick="event.stopPropagation();window.location='profile.html?id=${m.id}'">View Profile</button>
        <a class="card-wa" href="${waLink}" onclick="event.stopPropagation()" target="_blank"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg></a>
        <a class="card-tg" href="${tgLink}" onclick="event.stopPropagation()" target="_blank"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg></a>
      </div>
    </div>
  </div>`;
}

init();
</script>
